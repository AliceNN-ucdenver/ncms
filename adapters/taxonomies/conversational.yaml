# Per-domain taxonomy for conversational content.
#
# topic_labels:
#   - the topic classification vocabulary.  Topic head softmaxes over
#     this list.  Labels should be disjoint and cover the expected
#     content distribution; add a catch-all like "other" if your
#     content is heterogeneous.
#
# admission_labels / state_change_labels:
#   - optional overrides of the schema defaults.  Usually leave empty
#     and let the schema's enums (ADMISSION_DECISIONS / STATE_CHANGES)
#     win; populate here only if your deployment uses a custom
#     admission or state-change vocabulary.

topic_labels:
  - food_pref          # "I love sushi", "I can't stand cilantro"
  - hobby              # "I play chess", "my weekend hiking habit"
  - lifestyle          # "I'm a morning person", "coffee every day"
  - transit            # "I take the subway", "the aisle seat"
  - entertainment      # "I love jazz", "live comedy"
  - shopping_choice    # "went with the red one", "picked the vegetarian"
  - work_routine       # "I usually review PRs Fridays"
  - other              # catch-all for unmatched

# Token → topic map used by the SDG expander + autolabel_multihead
# to auto-tag rows.  Extended in Sprint 3 to cover the actual
# surface forms present in hand-labeled gold (cold weather,
# calculus final, spicy food, etc.) so gold Topic F1 isn't
# penalized by "other" fallbacks.

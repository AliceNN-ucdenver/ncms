# v9 conversational diversity taxonomy.
#
# Hierarchical entity-type taxonomy used at generation time to
# ensure training-data breadth across the open-vocabulary `object`
# slot.  All nodes are source=inline because the domain has no
# gazetteer (see domain.yaml rationale).
#
# ~900 example members across 28 leaf nodes.  The generator rotates
# through subcategories within an archetype batch so no single
# subcategory dominates (avoids the "100 pizza rows" failure mode).
#
# Topic hints match the topic-head vocabulary in domain.yaml.


# v9 clinical domain spec.
#
# Medical observations, medication changes, visit notes,
# symptom tracking, procedure follow-ups.
#
# ⚠️  v9 clinical adapter is a **text classification artifact**,
# not a clinical decision-support tool.  Content accuracy is
# sufficient for training a classifier over {medication /
# procedure / symptom / severity} slots — NOT for clinical
# recommendations.  The gazetteer is a curated common-vocabulary
# subset; a full medical gazetteer would require RxNorm + SNOMED
# integration (future work).

name: clinical
description: >-
  Clinical observations, medication changes, procedure follow-ups,
  symptom tracking — short natural-language utterances a care-team
  member or patient might log.
intended_content: |
  Short first-person / third-person clinical notes:
  "Started patient on metformin 500mg BID."
  "EKG showed normal sinus rhythm."
  "Patient reports moderate back pain, persistent for 2 weeks."
  "Switched from atorvastatin to rosuvastatin."

# Speaker constraint baked into the SDG prompt — prevents the LLM
# from inventing nonsensical subjects.  Caught in B'.7 by the
# gpt-4o cross-judge ("zoroastrianism adopted keras..." on
# software_dev; the same risk applies to clinical).
speaker_voice: >-
  a clinician or care-team member writing a brief observational
  note about a specific patient (third-person clinical voice; no
  direct quotes from the patient unless explicitly quoting)

slots:
  - medication
  - procedure
  - symptom
  - severity
  - alternative
  - frequency

topics:
  - medication_mgmt
  - procedure_care
  - symptom_observation
  - chronic_care
  - acute_care
  - preventive_care
  - other

# Phase A — subject types (timeline anchors).  Clinical subjects
# answer "this note is about whom/what."  Patient is by far the
# most common; condition / episode-of-care give finer-grained
# timelines for chronic-care reasoning.
subject_types:
  - patient                # the person the note is about
  - condition              # a diagnosis / chronic condition (timeline of severity)
  - treatment              # a course of treatment (medication regime, therapy)
  - episode_of_care        # an admission / visit / care episode

gazetteer_path: gazetteer.yaml
diversity_path: diversity.yaml
archetypes_path: archetypes.yaml

default_adapter_version: v9

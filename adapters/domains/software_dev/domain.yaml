# v9 software_dev domain spec.
#
# Prose software-development content — ADRs, RFCs, design docs,
# post-mortems, threat models.  Distinct from raw-diff-voice
# content (the pre-v9 ``swe_diff`` domain was removed in Phase
# B'.0a because diff prose isn't a good fit for cognitive memory).
#
# Slots / topics mirror the legacy ``SLOT_TAXONOMY['software_dev']``
# + ``adapters/taxonomies/software_dev.yaml`` vocabularies — no
# taxonomy change in this migration, only transport.

name: software_dev
description: >-
  Prose software-development content — ADRs, RFCs, design docs,
  post-mortems, threat models.
intended_content: |
  Natural-language state changes about software:
  "Decision: use Postgres.  Supersedes ADR-003."
  "Root cause: config drift after v2.3 rollout."
  Prose only — raw git diffs are out of scope for v9.

# Speaker constraint baked into the SDG prompt — engineering-team
# voice ("we", "the team", "our service", named teams or roles).
# Prevents the LLM from inventing pathological subjects
# ("zoroastrianism adopted keras over huggingface" — caught by
# the gpt-4o cross-judge in B'.7).
speaker_voice: >-
  a software engineer, tech lead, or engineering team writing
  about their own project decisions ("we", "the team", "our
  service") — never a religion, philosophy, country, or other
  abstract entity

slots:
  - language
  - framework
  - library
  - database
  - platform
  - tool
  - pattern
  - alternative      # "X over Y" role placeholder — standard across domains
  - frequency        # "every commit" role placeholder — standard across domains

topics:
  - framework
  - language_runtime
  - infra
  - testing
  - tooling
  - package_mgmt
  - editor
  - other

# Phase A — subject types (timeline anchors).  These are NOT slots;
# slots tag entities mentioned within content, subject_types tag
# what a memory is *about* (its primary timeline).  A single
# memory can pin multiple subjects (e.g. "ADR-004 supersedes
# ADR-002 for auth-service" → adr:004, adr:002, service:auth-api).
subject_types:
  - service          # a deployable system component (auth-service)
  - component        # a sub-module within a service (auth-service::tokens)
  - repo             # a code repository
  - team             # an engineering team
  - decision         # an ADR / architecture decision (adr:004)
  - incident         # a post-mortem / outage event
  - feature          # a feature flag or product capability
  - environment      # a runtime environment (prod / staging / dev-east)
  - dependency       # an external library or upstream service

# Default file paths; overridable via the `paths` / `adapter` blocks.
gazetteer_path: gazetteer.yaml
diversity_path: diversity.yaml
archetypes_path: archetypes.yaml

default_adapter_version: v9

# v9 software_dev archetypes — starter set.
#
# Six archetypes covering the major joint label combinations.
# The full 16-archetype stratified set lands in Phase B'.2 once
# the generator pipeline is wired to Spark.  These six are enough
# to exercise every intent class + every admission class + every
# state_change class + three of the four role labels (primary,
# alternative, casual — not_relevant added with query-voice
# archetypes in Phase B'.2).
#
# See docs/research/v9-corpus-generation-design.md for archetype
# semantics.

archetypes:
  - name: positive_framework_adoption
    intent: positive
    admission: persist
    state_change: declaration
    role_spans:
      - {role: primary, slot: framework, count: 1}
    n_gold: 40
    n_sdg: 160
    target_min_chars: 30
    target_max_chars: 180
    batch_size: 10
    description: >-
      User / team declares they've adopted a new framework.
    example_utterances:
      - "We migrated to FastAPI last sprint — much cleaner than Flask."
      - "Team adopted Next.js for the marketing site."
      - "Decision: standardize on SvelteKit for internal admin tools."
    phrasings:
      - "We switched to {primary} for {scope}."
      - "Adopted {primary} for {scope} — {rationale}."
      - "Now using {primary} as our {role_description}."

  - name: choice_framework_vs_alternative
    intent: choice
    admission: persist
    state_change: declaration
    role_spans:
      - {role: primary, slot: framework, count: 1}
      - {role: alternative, slot: framework, count: 1}
    n_gold: 50
    n_sdg: 180
    target_min_chars: 40
    target_max_chars: 220
    batch_size: 10
    description: >-
      Team chose framework X over framework Y, with rationale.
    example_utterances:
      - "We went with Django over Rails because the team's Python expertise is stronger."
      - "Picked Vue over React for the internal dashboard — easier onboarding for our juniors."
      - "Chose Remix over Next.js on this one: tighter data-loading story."
    phrasings:
      - "Chose {primary} over {alternative} because {rationale}."
      - "Picked {primary} (not {alternative}) — {rationale}."
      - "Went with {primary} instead of {alternative} for {scope}."

  - name: habitual_tool_use
    intent: habitual
    admission: persist
    state_change: none
    role_spans:
      - {role: primary, slot: tool, count: 1}
    n_gold: 30
    n_sdg: 140
    target_min_chars: 25
    target_max_chars: 140
    batch_size: 10
    description: >-
      Team/user describes a recurring use of a tool as part of workflow.
    example_utterances:
      - "We run pytest on every pull request."
      - "Prettier formats the whole repo on pre-commit."
      - "Datadog dashboards get checked every morning standup."
    phrasings:
      - "We run {primary} {frequency}."
      - "{primary} is part of our {frequency} workflow."
      - "Every {frequency} we use {primary} for {scope}."

  - name: negative_framework_retirement
    intent: negative
    admission: persist
    state_change: retirement
    role_spans:
      - {role: primary, slot: framework, count: 1}
    n_gold: 30
    n_sdg: 140
    target_min_chars: 30
    target_max_chars: 180
    batch_size: 10
    description: >-
      Team retires/deprecates a framework, with negative sentiment.
    example_utterances:
      - "We're retiring Angular.js — the maintenance burden isn't worth it."
      - "Dropping Knockout after years of workarounds."
      - "Finally deleting the last Backbone.js code path."
    phrasings:
      - "Retiring {primary} — {rationale}."
      - "Deprecating {primary} in favor of a simpler approach."
      - "Dropped {primary} for {scope}."

  - name: neutral_casual_observation
    intent: none
    admission: persist
    state_change: none
    role_spans:
      - {role: casual, slot: framework, count: 1}
    n_gold: 30
    n_sdg: 120
    target_min_chars: 40
    target_max_chars: 200
    batch_size: 10
    description: >-
      Narrative observation mentioning a framework casually, no preference.
    example_utterances:
      - "The codebase uses a mix of Django and FastAPI across services."
      - "Some of the legacy handlers still run on Flask."
      - "Our customer support team operates a Node.js helpdesk integration."
    phrasings:
      - "The {scope} uses {casual}."
      - "Some of the {scope} still uses {casual}."
      - "We have a {casual}-based {scope}."

  - name: difficulty_temporary
    intent: difficulty
    admission: ephemeral
    state_change: none
    role_spans:
      - {role: primary, slot: tool, count: 1}
    n_gold: 20
    n_sdg: 100
    target_min_chars: 25
    target_max_chars: 140
    batch_size: 10
    description: >-
      Transient frustration with a tool — shouldn't persist to long-term memory.
    example_utterances:
      - "Webpack config fighting me again this morning."
      - "pytest discovery broke on the new test folder — will fix later."
      - "Terraform plan output is unreadable today."
    phrasings:
      - "{primary} is giving us trouble today."
      - "Stuck on a {primary} issue this afternoon."
      - "{primary} acting up — will revisit tomorrow."

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nvidia-nat-ncms"
version = "0.1.0"
description = "NCMS memory provider plugin for NVIDIA NeMo Agent Toolkit"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "nvidia-nat-core>=1.0",
    "httpx>=0.27",
    "pydantic>=2.0",
    "langgraph>=0.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[project.entry-points."nat.plugins"]
ncms = "nat.plugins.ncms"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
asyncio_mode = "auto"

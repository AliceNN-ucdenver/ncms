<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCMS Dashboard</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2129;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-green: #3fb950;
    --accent-amber: #d29922;
    --accent-red: #f85149;
    --accent-blue: #58a6ff;
    --accent-purple: #bc8cff;
    --accent-cyan: #39d2c0;
    --accent-pink: #f778ba;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ────────────────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    height: 56px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-purple);
    letter-spacing: 1px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    font-size: 13px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
  }

  .stat-value {
    color: var(--text-primary);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }

  .connection-dot.disconnected {
    background: var(--accent-red);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Main Layout ─────────────────────────────────────────────── */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: calc(100vh - 56px);
    padding: 24px 32px 16px;
    gap: 0;
    overflow: auto;
  }

  /* ── Agent Area (all above bus) ──────────────────────────────── */
  .agents-area {
    display: flex;
    gap: 28px;
    justify-content: center;
    align-items: flex-end;
    flex-wrap: wrap;
    width: 100%;
    max-width: 1400px;
    margin-bottom: 0;
  }

  /* ── Agent Column: card + connector ─────────────────────────── */
  .agent-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 270px;
  }

  /* ── Agent Node ─────────────────────────────────────────────── */
  .agent-node {
    width: 270px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.3s;
  }

  .agent-node:hover {
    border-color: var(--accent-purple);
  }

  /* ── Connector Line (agent → bus) ───────────────────────────── */
  .agent-connector {
    width: 3px;
    height: 40px;
    background: var(--border);
    position: relative;
    overflow: visible;
    transition: background 0.3s;
  }

  /* Flow dot that travels down the connector line */
  .agent-connector .flow-dot {
    position: absolute;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    left: -2px;
    top: -4px;
    opacity: 0;
    pointer-events: none;
  }

  .agent-connector .flow-dot.sending {
    background: var(--accent-blue);
    box-shadow: 0 0 6px var(--accent-blue);
  }

  .agent-connector .flow-dot.receiving {
    background: var(--accent-green);
    box-shadow: 0 0 6px var(--accent-green);
  }

  @keyframes flowDown {
    0%   { top: -4px; opacity: 1; }
    100% { top: 36px; opacity: 0.3; }
  }

  @keyframes flowUp {
    0%   { top: 36px; opacity: 1; }
    100% { top: -4px; opacity: 0.3; }
  }

  .agent-connector .flow-dot.animate-send {
    animation: flowDown 0.5s ease-out forwards;
  }

  .agent-connector .flow-dot.animate-receive {
    animation: flowUp 0.5s ease-out forwards;
  }

  /* Active glow on connector */
  .agent-connector.flow-send {
    background: var(--accent-blue);
    box-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
  }

  .agent-connector.flow-receive {
    background: var(--accent-green);
    box-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
  }

  /* ── Agent Card Content ─────────────────────────────────────── */
  .agent-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 6px;
  }

  .agent-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .status-online { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
  .status-sleeping { background: rgba(210, 153, 34, 0.15); color: var(--accent-amber); }
  .status-offline { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }

  .agent-domains {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 0 12px 8px;
    min-height: 40px;
    max-height: 40px;
    overflow: hidden;
    align-content: flex-start;
  }

  .domain-tag {
    font-size: 11px;
    padding: 2px 6px;
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent-blue);
    border-radius: 4px;
    border: 1px solid rgba(88, 166, 255, 0.2);
  }

  .activity-list {
    height: 148px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    padding: 4px 0;
  }

  .activity-list::-webkit-scrollbar { width: 4px; }
  .activity-list::-webkit-scrollbar-track { background: transparent; }
  .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease;
  }

  .activity-item:hover {
    background: var(--bg-tertiary);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .activity-icon {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .icon-ask { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }
  .icon-response { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
  .icon-reply { background: rgba(63, 185, 80, 0.12); color: var(--accent-green); }
  .icon-announce { background: rgba(210, 153, 34, 0.15); color: var(--accent-amber); }
  .icon-surrogate { background: rgba(247, 120, 186, 0.15); color: var(--accent-pink); }
  .icon-memory { background: rgba(57, 210, 192, 0.15); color: var(--accent-cyan); }
  .icon-search { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }
  .icon-agent { background: rgba(188, 140, 255, 0.15); color: var(--accent-purple); }

  .activity-from {
    font-size: 10px;
    color: var(--accent-green);
    font-weight: 600;
    line-height: 1;
    margin-bottom: 1px;
  }

  .activity-from.from-snapshot {
    color: var(--accent-pink);
  }

  .snapshot-badge {
    font-size: 8px;
    padding: 1px 4px;
    border-radius: 3px;
    background: rgba(247, 120, 186, 0.15);
    color: var(--accent-pink);
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    vertical-align: middle;
    margin-left: 4px;
  }

  .activity-text {
    flex: 1;
    color: var(--text-secondary);
    line-height: 1.4;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .activity-time {
    color: var(--text-muted);
    font-size: 10px;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
  }

  .no-activity {
    color: var(--text-muted);
    font-size: 11px;
    text-align: center;
    padding: 16px 8px;
    font-style: italic;
  }

  /* ── Knowledge Bus Backbone ─────────────────────────────────── */
  .bus-backbone {
    width: 90%;
    max-width: 1400px;
    height: 44px;
    background: linear-gradient(90deg,
      rgba(188, 140, 255, 0.08) 0%,
      rgba(188, 140, 255, 0.18) 30%,
      rgba(88, 166, 255, 0.18) 70%,
      rgba(57, 210, 192, 0.08) 100%
    );
    border: 1px solid rgba(188, 140, 255, 0.25);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 0;
    flex-shrink: 0;
  }

  .bus-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-purple);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bus-label::before,
  .bus-label::after {
    content: '';
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
  }

  /* ── Waiting State ──────────────────────────────────────────── */
  .waiting-message {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 40px;
    font-style: italic;
  }

  /* ── Detail Modal ───────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: modalFade 0.2s ease;
  }

  @keyframes modalFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 560px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }

  .modal-close:hover {
    color: var(--text-primary);
  }

  .modal-type {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent-purple);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .source-banner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .source-live {
    background: rgba(63, 185, 80, 0.12);
    color: var(--accent-green);
    border: 1px solid rgba(63, 185, 80, 0.25);
  }

  .source-snapshot {
    background: rgba(247, 120, 186, 0.12);
    color: var(--accent-pink);
    border: 1px solid rgba(247, 120, 186, 0.25);
  }

  .modal-agent {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .modal-field {
    margin-bottom: 12px;
  }

  .modal-field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .modal-field-value {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.5;
    word-break: break-word;
    padding: 8px 12px;
    background: var(--bg-secondary);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .modal-tag {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(88, 166, 255, 0.1);
    color: var(--accent-blue);
    border: 1px solid rgba(88, 166, 255, 0.2);
  }

  .modal-confidence {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 13px;
  }

  .confidence-high { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
  .confidence-med { background: rgba(210, 153, 34, 0.15); color: var(--accent-amber); }
  .confidence-low { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }

  /* ── Pipeline Panel ───────────────────────────────────────────── */
  .pipeline-panel {
    width: 90%;
    max-width: 1400px;
    margin: 12px 0 8px;
    flex-shrink: 0;
  }

  .pipeline-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
    padding: 8px 0;
  }

  .pipeline-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
  }

  .pipeline-card.pipeline-new {
    animation: fadeIn 0.3s ease;
  }

  .pipeline-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .pipeline-type-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pipeline-type-store {
    background: rgba(57, 210, 192, 0.15);
    color: var(--accent-cyan);
    border: 1px solid rgba(57, 210, 192, 0.3);
  }

  .pipeline-type-search {
    background: rgba(88, 166, 255, 0.15);
    color: var(--accent-blue);
    border: 1px solid rgba(88, 166, 255, 0.3);
  }

  .pipeline-agent {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  .pipeline-duration {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }

  .pipeline-stages {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    padding: 4px 0;
  }

  .pipeline-stages::-webkit-scrollbar { height: 3px; }
  .pipeline-stages::-webkit-scrollbar-track { background: transparent; }
  .pipeline-stages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pipeline-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    min-width: 64px;
    cursor: pointer;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .pipeline-stage:hover {
    transform: translateY(-2px);
  }

  .pipeline-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    border: 2px solid var(--border);
    transition: all 0.3s ease;
  }

  .pipeline-stage.reached .pipeline-dot {
    background: var(--accent-green);
    border-color: var(--accent-green);
    box-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
  }

  .pipeline-stage.active .pipeline-dot {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    animation: pulseDot 1s ease-in-out infinite;
  }

  .pipeline-stage.skipped .pipeline-dot {
    background: var(--bg-tertiary);
    border-color: var(--border);
    opacity: 0.4;
  }

  @keyframes pulseDot {
    0%, 100% { box-shadow: 0 0 4px rgba(88, 166, 255, 0.4); }
    50% { box-shadow: 0 0 12px rgba(88, 166, 255, 0.8); }
  }

  .pipeline-stage-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-align: center;
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pipeline-stage.reached .pipeline-stage-label {
    color: var(--accent-green);
  }

  .pipeline-stage.active .pipeline-stage-label {
    color: var(--accent-blue);
  }

  .pipeline-stage-time {
    font-size: 9px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .pipeline-stage.reached .pipeline-stage-time {
    color: var(--text-secondary);
  }

  .pipeline-arrow {
    width: 20px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
    margin: 0 -2px;
    position: relative;
    top: -10px;
  }

  .pipeline-arrow.reached {
    background: var(--accent-green);
    box-shadow: 0 0 4px rgba(63, 185, 80, 0.3);
  }

  /* Stage detail (expandable) */
  .pipeline-stage-detail {
    width: 100%;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    animation: fadeIn 0.2s ease;
  }

  .pipeline-stage-detail-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-green);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }

  .pipeline-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .pipeline-detail-key {
    color: var(--text-muted);
    font-size: 11px;
  }

  .pipeline-detail-value {
    color: var(--text-primary);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Pipeline candidates (debug mode) ────────────────────────── */
  .pipeline-candidates-header {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent-purple);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 8px;
    margin-bottom: 4px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  .pipeline-candidates {
    max-height: 240px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .pipeline-candidates::-webkit-scrollbar { width: 4px; }
  .pipeline-candidates::-webkit-scrollbar-track { background: transparent; }
  .pipeline-candidates::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 2px;
  }

  .pipeline-candidate-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 4px;
    border-radius: 4px;
    font-size: 11px;
    transition: background 0.15s;
  }

  .pipeline-candidate-item:hover {
    background: var(--bg-tertiary);
  }

  .pipeline-candidate-rank {
    color: var(--text-muted);
    font-size: 10px;
    min-width: 20px;
    font-variant-numeric: tabular-nums;
  }

  .pipeline-candidate-score {
    color: var(--accent-cyan);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    min-width: 48px;
    text-align: right;
  }

  .pipeline-candidate-content {
    color: var(--text-secondary);
    font-size: 10px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .pipeline-candidate-scores {
    font-size: 9px;
    color: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Conversation Thread (in modal) ──────────────────────────── */
  .thread-section {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  .thread-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .thread-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .thread-message {
    display: flex;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .thread-message:hover {
    border-color: var(--accent-purple);
  }

  .thread-avatar {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  .thread-avatar.ask { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); }

<body>

<div class="header">
  <div class="header-left">
    <div class="connection-dot" id="connection-dot"></div>
    <div>
      <span class="logo">NCMS</span>
      <span class="logo-sub">Dashboard</span>
    </div>
  </div>
  <div class="stats-bar" id="stats-bar">
    <div class="stat">Memories <span class="stat-value" id="stat-memories">0</span></div>
    <div class="stat">Entities <span class="stat-value" id="stat-entities">0</span></div>
    <div class="stat">Agents <span class="stat-value" id="stat-agents">0</span></div>
    <div class="stat">Events <span class="stat-value" id="stat-events">0</span></div>
    <button class="graph-btn" onclick="openGraphView()">&#x2B22; View Graph</button>
  </div>
</div>

<div class="main">
  <!-- All agents above the bus -->
  <div class="agents-area" id="agents-area">
    <div class="waiting-message">Waiting for agents to connect...</div>
  </div>

  <!-- Pipeline Observability Panel -->
  <div class="pipeline-panel" id="pipeline-panel">
    <div class="pipeline-empty">No pipeline activity yet</div>
  </div>

  <!-- Central Knowledge Bus backbone -->
  <div class="bus-backbone">
    <span class="bus-label">Knowledge Bus</span>
  </div>
</div>

<!-- Knowledge Graph Overlay -->
<div class="graph-overlay" id="graph-overlay" style="display:none">
  <div class="graph-header">
    <div class="graph-header-left">
      <span class="graph-title">&#x2B22; Knowledge Graph</span>
      <input type="text" class="graph-search" id="graph-search" placeholder="Search nodes..." oninput="filterGraphNodes(this.value)">
    </div>
    <div class="graph-filters" id="graph-filters"></div>
    <button class="topics-btn" onclick="toggleTopicsPanel()">&#x1F3F7; Topics</button>
    <button class="graph-close-btn" onclick="closeGraphView()">&times;</button>
  </div>
  <div class="graph-body">
    <svg id="graph-svg"></svg>
    <div class="graph-detail-panel" id="graph-detail-panel" style="display:none"></div>
    <div class="topics-panel" id="topics-panel" style="display:none"></div>
  </div>
  <div class="graph-legend" id="graph-legend"></div>
</div>

<!-- Detail modal (rendered dynamically) -->
<div id="modal-root"></div>

<script>
// ── State ────────────────────────────────────────────────────────────
const state = {
  agents: {},
  eventCount: 0,
  agentActivities: {},   // agent_id -> [event, ...]
  eventStore: {},        // event.id -> event (for modal lookup)
  askIndex: {},          // ask_id -> { askEvent, responses: [event, ...] }
  pipelines: {},         // pipeline_id -> { type, stages: [{stage, duration_ms, data, timestamp}], agent_id }
  activePipeline: null,  // pipeline_id of the most recent pipeline
  expandedStage: null,   // { pipelineId, stage } for detail view
};

const MAX_ACTIVITIES = 25;
const MAX_PIPELINES = 20;

// Stage order arrays — stages not emitted appear as grey (skipped)
const STORE_STAGES = [
  'start', 'persist', 'bm25_index', 'splade_index',
  'entity_extraction', 'graph_linking',
  'contradiction', 'complete'
];
const SEARCH_STAGES = [
  'start', 'bm25', 'splade', 'rrf_fusion',
  'entity_extraction', 'graph_expansion', 'actr_scoring',
  'complete'
];

// Human-readable stage labels
const STAGE_LABELS = {
  start: 'Start',
  persist: 'SQLite',
  bm25_index: 'BM25 Index',
  splade_index: 'SPLADE',
  entity_extraction: 'Entities',
  graph_linking: 'Graph Link',
  contradiction: 'Contradict',
  complete: 'Done',
  bm25: 'BM25',
  splade: 'SPLADE',
  rrf_fusion: 'RRF Fuse',
  graph_expansion: 'Graph Exp.',
  actr_scoring: 'ACT-R',
};

// ── SSE Connection ───────────────────────────────────────────────────
let eventSource = null;
let reconnectTimeout = null;

function connectSSE() {
  if (eventSource) eventSource.close();

  eventSource = new EventSource('/api/events/stream');

  eventSource.onopen = () => {
    document.getElementById('connection-dot').classList.remove('disconnected');
  };

  eventSource.onerror = () => {
    document.getElementById('connection-dot').classList.add('disconnected');
    eventSource.close();
    clearTimeout(reconnectTimeout);
    reconnectTimeout = setTimeout(connectSSE, 3000);
  };

  const eventTypes = [
    'agent.registered', 'agent.deregistered', 'agent.status',
    'bus.ask', 'bus.response', 'bus.announce', 'bus.surrogate',
    'memory.stored', 'memory.searched'
  ];

  eventTypes.forEach(type => {
    eventSource.addEventListener(type, (e) => {
      handleEvent(JSON.parse(e.data));
    });
  });

  // Pipeline stage events — listen for all pipeline.store.* and pipeline.search.* types
  const pipelineStages = [
    ...STORE_STAGES.map(s => `pipeline.store.${s}`),
    ...SEARCH_STAGES.map(s => `pipeline.search.${s}`),
  ];
  pipelineStages.forEach(type => {
    eventSource.addEventListener(type, (e) => {
      handlePipelineEvent(JSON.parse(e.data));
    });
  });
}

// ── Event Handling ───────────────────────────────────────────────────
function handleEvent(event) {
  state.eventCount++;
  state.eventStore[event.id] = event;
  const d = event.data || {};

  // Agent lifecycle events
  if (event.type.startsWith('agent.')) {
    handleAgentEvent(event);
  }

  // Index asks and responses for conversation threading
  if (event.type === 'bus.ask' && d.ask_id) {
    state.askIndex[d.ask_id] = { askEvent: event, responses: [] };
  }
  if ((event.type === 'bus.response' || event.type === 'bus.surrogate') && d.ask_id) {
    const thread = state.askIndex[d.ask_id];
    if (thread) {
      thread.responses.push(event);
      // Also add reply to the ASKING agent's feed
      const askingAgent = thread.askEvent.agent_id;
      if (askingAgent && askingAgent !== event.agent_id) {
        const replyEntry = Object.assign({}, event, { _isReply: true, _replyFrom: event.agent_id });
        state.eventStore[event.id + '_reply'] = replyEntry;
        addAgentActivity(askingAgent, replyEntry);
        // Animate a RECEIVE on the asking agent's connector
        animateFlow(askingAgent, 'receive');
      }
    }
  }

  // Route events to agent activity lists
  if (event.agent_id) {
    addAgentActivity(event.agent_id, event);
  }

  // Also add to target/recipient agents
  if (event.type === 'bus.ask' && d.targets) {
    d.targets.forEach(t => {
      if (t !== event.agent_id) {
        addAgentActivity(t, event);
        animateFlow(t, 'receive');
      }
    });
  }
  if (event.type === 'bus.announce' && d.recipients) {
    d.recipients.forEach(r => {
      if (r !== event.agent_id) {
        addAgentActivity(r, event);
        animateFlow(r, 'receive');
      }
    });
  }

  // Animate SEND on the originating agent's connector
  if (event.agent_id && !event._isReply) {
    const isSending = ['bus.ask', 'bus.response', 'bus.announce', 'bus.surrogate'].includes(event.type);
    animateFlow(event.agent_id, isSending ? 'send' : 'neutral');
  }

  updateStats();
}

function handleAgentEvent(event) {
  const agentId = event.agent_id;
  if (!agentId) return;

  if (event.type === 'agent.registered') {
    state.agents[agentId] = {
      agent_id: agentId,
      domains: event.data.domains || [],
      status: 'online',
    };
  } else if (event.type === 'agent.deregistered') {
    if (state.agents[agentId]) {
      state.agents[agentId].status = 'offline';
    }
  } else if (event.type === 'agent.status') {
    if (state.agents[agentId]) {
      state.agents[agentId].status = event.data.status;
    }
  }

  renderAgents();
}

// ── Agent Activity ───────────────────────────────────────────────────
function addAgentActivity(agentId, event) {
  if (!state.agentActivities[agentId]) {
    state.agentActivities[agentId] = [];
  }

  // Avoid duplicate events in same agent's feed
  const existing = state.agentActivities[agentId];
  if (existing.length > 0 && existing[0].id === event.id) return;

  existing.unshift(event);
  if (existing.length > MAX_ACTIVITIES) {
    existing.pop();
  }
  renderAgentActivity(agentId);
}

function renderAgentActivity(agentId) {
  const list = document.getElementById(`activity-${agentId}`);
  if (!list) return;

  const activities = state.agentActivities[agentId] || [];
  if (activities.length === 0) {
    list.innerHTML = '<div class="no-activity">No activity yet</div>';
    return;
  }

  list.innerHTML = activities.map(e => activityItemHTML(e)).join('');
}

function activityItemHTML(event) {
  const d = event.data || {};
  const time = formatTime(event.timestamp);
  let icon, text, fromLabel = '';

  // Check if this is a reply routed to the asking agent's feed
  if (event._isReply) {
    const replyFrom = event._replyFrom || event.agent_id;
    const isSurrogate = event.type === 'bus.surrogate';
    icon = isSurrogate
      ? '<span class="activity-icon icon-surrogate">&#x21A9;</span>'
      : '<span class="activity-icon icon-reply">&#x21A9;</span>';
    text = d.answer || (isSurrogate ? `Surrogate (${(d.confidence * 100).toFixed(0)}%)` : 'Response');
    const fromClass = isSurrogate ? 'activity-from from-snapshot' : 'activity-from';
    const snapshotTag = isSurrogate ? '<span class="snapshot-badge">snapshot</span>' : '';
    fromLabel = `<div class="${fromClass}">${escapeHtml(replyFrom)}${snapshotTag}</div>`;
    const shortText = text.length > 45 ? text.slice(0, 42) + '...' : text;
    const realId = event.id.replace(/_reply$/, '');
    return `<div class="activity-item" onclick="showDetail('${realId}')">
      ${icon}
      <div style="flex:1;min-width:0;overflow:hidden">
        ${fromLabel}
        <span class="activity-text" title="${escapeHtml(text)}">${escapeHtml(shortText)}</span>
      </div>
      <span class="activity-time">${time}</span>
    </div>`;
  }

  switch (event.type) {
    case 'bus.ask':
      icon = '<span class="activity-icon icon-ask">?</span>';
      text = d.question || 'Asked a question';
      break;
    case 'bus.response':
      icon = '<span class="activity-icon icon-response">&#x2713;</span>';
      text = d.answer || `Responded (${d.source_mode}, ${(d.confidence * 100).toFixed(0)}%)`;
      break;
    case 'bus.announce':
      icon = '<span class="activity-icon icon-announce">!</span>';
      text = d.content || `Announced: ${d.event}`;
      break;
    case 'bus.surrogate':
      icon = '<span class="activity-icon icon-surrogate">&#x2601;</span>';
      text = d.answer || `Surrogate (${(d.confidence * 100).toFixed(0)}%)`;
      const surShort = text.length > 40 ? text.slice(0, 37) + '...' : text;
      return `<div class="activity-item" onclick="showDetail('${event.id}')">
        ${icon}
        <div style="flex:1;min-width:0;overflow:hidden">
          <span class="activity-text" title="${escapeHtml(text)}">${escapeHtml(surShort)}<span class="snapshot-badge">snapshot</span></span>
        </div>
        <span class="activity-time">${time}</span>
      </div>`;
    case 'memory.stored':
      icon = '<span class="activity-icon icon-memory">&#x2B22;</span>';
      text = d.content || 'Memory stored';
      break;
    case 'memory.searched':
      icon = '<span class="activity-icon icon-search">&#x2315;</span>';
      text = `Search: "${d.query}" (${d.result_count})`;
      break;
    case 'agent.registered':
      icon = '<span class="activity-icon icon-agent">+</span>';
      text = 'Registered';
      break;
    case 'agent.deregistered':
      icon = '<span class="activity-icon icon-agent">&minus;</span>';
      text = 'Deregistered';
      break;
    case 'agent.status':
      icon = '<span class="activity-icon icon-agent">&#x25CF;</span>';
      text = `Status: ${d.status}`;
      break;
    default:
      icon = '<span class="activity-icon icon-agent">&#x2022;</span>';
      text = event.type;
  }

  const shortText = text.length > 50 ? text.slice(0, 47) + '...' : text;

  return `<div class="activity-item" onclick="showDetail('${event.id}')">
    ${icon}
    <span class="activity-text" title="${escapeHtml(text)}">${escapeHtml(shortText)}</span>
    <span class="activity-time">${time}</span>
  </div>`;
}

function agentColumnHTML(agent) {

// ── Connector Animation ──────────────────────────────────────────────
function animateFlow(agentId, direction) {
  if (!agentId) return;
  const connector = document.getElementById(`connector-${agentId}`);
  const dot = document.getElementById(`flow-dot-${agentId}`);
  if (!connector) return;

  // Clear previous states
  connector.classList.remove('flow-send', 'flow-receive');

  if (direction === 'send') {
    connector.classList.add('flow-send');
    if (dot) {
      dot.className = 'flow-dot sending';
      void dot.offsetWidth; // force reflow
      dot.classList.add('animate-send');
    }
  } else if (direction === 'receive') {
    connector.classList.add('flow-receive');
    if (dot) {
      dot.className = 'flow-dot receiving';
      void dot.offsetWidth;
      dot.classList.add('animate-receive');
    }
  }

  // Reset after animation
  setTimeout(() => {
    connector.classList.remove('flow-send', 'flow-receive');
    if (dot) dot.className = 'flow-dot';
  }, 600);
}

// ── Detail Modal ─────────────────────────────────────────────────────
function showDetail(eventId) {
  const event = state.eventStore[eventId];
  if (!event) return;

  const d = event.data || {};
  let fieldsHTML = '';

  if (event.type === 'bus.ask') {
    fieldsHTML += modalField('Question', d.question || '(empty)');
    fieldsHTML += modalField('Domains', tagsHTML(d.domains));
    fieldsHTML += modalField('Routed To', tagsHTML(d.targets));
    fieldsHTML += buildThreadHTML(d.ask_id, event);
  } else if (event.type === 'bus.response') {
    fieldsHTML += modalField('Answer', d.answer || '(not available)');
    fieldsHTML += modalField('Source Mode', d.source_mode);
    fieldsHTML += modalField('Confidence', confidenceHTML(d.confidence));
    fieldsHTML += buildThreadHTML(d.ask_id, event);
  } else if (event.type === 'bus.announce') {
    fieldsHTML += modalField('Event', d.event);
    fieldsHTML += modalField('Content', d.content || '(not available)');
    fieldsHTML += modalField('Severity', d.severity);
    fieldsHTML += modalField('Domains', tagsHTML(d.domains));
    fieldsHTML += modalField('Recipients', tagsHTML(d.recipients));
  } else if (event.type === 'bus.surrogate') {
    fieldsHTML += modalField('Answer', d.answer || '(not available)');
    fieldsHTML += modalField('Confidence', confidenceHTML(d.confidence));
    fieldsHTML += modalField('Snapshot Age', formatAge(d.snapshot_age_seconds));
    fieldsHTML += buildThreadHTML(d.ask_id, event);
  } else if (event.type === 'memory.stored') {
    fieldsHTML += modalField('Content', d.content || '');
    fieldsHTML += modalField('Type', d.type);
    fieldsHTML += modalField('Domains', tagsHTML(d.domains));
    fieldsHTML += modalField('Entities Extracted', String(d.entity_count || 0));
  } else if (event.type === 'memory.searched') {
    fieldsHTML += modalField('Query', d.query || '');
    fieldsHTML += modalField('Results', String(d.result_count));
    if (d.top_score != null) {
      fieldsHTML += modalField('Top Score', d.top_score.toFixed(3));
    }
  } else {
    fieldsHTML += modalField('Data', '<pre>' + escapeHtml(JSON.stringify(d, null, 2)) + '</pre>');
  }

  // Source banner for responses
  let sourceBanner = '';
  if (event.type === 'bus.response') {
    sourceBanner = '<div class="source-banner source-live">&#x2713; Live Agent Response</div>';
  } else if (event.type === 'bus.surrogate') {
    const age = d.snapshot_age_seconds ? ` &middot; snapshot ${formatAge(d.snapshot_age_seconds)} old` : '';
    sourceBanner = `<div class="source-banner source-snapshot">&#x2601; Snapshot Response${age}</div>`;
  }

  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-type">${event.type}</div>
        <div class="modal-agent">${event.agent_id || 'System'} &middot; ${formatTimeFull(event.timestamp)}</div>
        ${sourceBanner}
        ${fieldsHTML}
      </div>
    </div>`;
}

function closeModal(e) {
  if (e && e.target && !e.target.classList.contains('modal-overlay')) return;
  document.getElementById('modal-root').innerHTML = '';
}

function modalField(label, value) {
  return `<div class="modal-field">
    <div class="modal-field-label">${label}</div>
    <div class="modal-field-value">${value}</div>
  </div>`;
}

function tagsHTML(items) {
  if (!items || items.length === 0) return '<span style="color: var(--text-muted)">none</span>';
  return '<div class="modal-tags">' +
    items.map(t => `<span class="modal-tag">${escapeHtml(t)}</span>`).join('') +
    '</div>';
}

function confidenceHTML(confidence) {
  if (confidence == null) return 'N/A';
  const pct = (confidence * 100).toFixed(1);
  const cls = confidence >= 0.7 ? 'confidence-high' :
              confidence >= 0.4 ? 'confidence-med' : 'confidence-low';
  return `<span class="modal-confidence ${cls}">${pct}%</span>`;
}

// ── Conversation Thread (for modal) ──────────────────────────────────
function buildThreadHTML(askId, currentEvent) {
  if (!askId) return '';
  const thread = state.askIndex[askId];
  if (!thread) return '';

  let html = '<div class="thread-section">';
  html += '<div class="thread-label">Conversation</div>';

  // The original ask
  const askEvt = thread.askEvent;
  const askData = askEvt.data || {};
  const isCurrentAsk = (currentEvent.id === askEvt.id);
  html += `<div class="thread-message" onclick="showDetail('${askEvt.id}')" style="${isCurrentAsk ? 'border-color: var(--accent-blue);' : ''}">
    <div class="thread-avatar ask">?</div>
    <div class="thread-body">
      <div class="thread-agent">
        ${escapeHtml(askEvt.agent_id || 'unknown')}
        <span class="thread-agent-badge badge-asker">asked</span>
      </div>
      <div class="thread-text">${escapeHtml(askData.question || '(empty)')}</div>
      <div class="thread-meta">${formatTimeFull(askEvt.timestamp)}${askData.domains ? ' &middot; ' + askData.domains.join(', ') : ''}</div>
    </div>
  </div>`;

  // All responses
  for (const resp of thread.responses) {
    const rd = resp.data || {};
    const isSurrogate = resp.type === 'bus.surrogate';
    const isCurrent = (currentEvent.id === resp.id);
    const avatarClass = isSurrogate ? 'surrogate' : 'response';
    const badgeClass = isSurrogate ? 'badge-surrogate' : 'badge-responder';
    const badgeText = isSurrogate ? 'surrogate' : 'responded';
    const confPct = rd.confidence != null ? ` &middot; ${(rd.confidence * 100).toFixed(0)}%` : '';

    html += `<div class="thread-message" onclick="showDetail('${resp.id}')" style="${isCurrent ? 'border-color: var(--accent-green);' : ''}">
      <div class="thread-avatar ${avatarClass}">${isSurrogate ? '&#x2601;' : '&#x2713;'}</div>
      <div class="thread-body">
        <div class="thread-agent">
          ${escapeHtml(resp.agent_id || 'unknown')}
          <span class="thread-agent-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="thread-text">${escapeHtml(rd.answer || '(no answer text)')}</div>
        <div class="thread-meta">${formatTimeFull(resp.timestamp)}${confPct}${isSurrogate && rd.snapshot_age_seconds ? ' &middot; snapshot ' + formatAge(rd.snapshot_age_seconds) + ' old' : ''}</div>
      </div>
    </div>`;
  }

  if (thread.responses.length === 0) {
    html += '<div style="color: var(--text-muted); font-size: 12px; font-style: italic; padding: 8px 0;">Awaiting response...</div>';
  }

  html += '</div>';
  return html;
}

// ── Pipeline Handling ────────────────────────────────────────────────
function handlePipelineEvent(event) {
  const d = event.data || {};
  const pipelineId = d.pipeline_id;
  if (!pipelineId) return;

  // Create or update pipeline entry
  if (!state.pipelines[pipelineId]) {
    state.pipelines[pipelineId] = {
      type: d.pipeline_type,
      stages: [],
      agent_id: event.agent_id,
      started: event.timestamp,
    };
  }

  const pipeline = state.pipelines[pipelineId];
  pipeline.stages.push({
    stage: d.stage,
    duration_ms: d.duration_ms,
    data: d,
    timestamp: event.timestamp,
  });

  // Track total duration from complete stage
  if (d.stage === 'complete' && d.total_duration_ms != null) {
    pipeline.total_duration_ms = d.total_duration_ms;
  }

  // This becomes the active pipeline
  state.activePipeline = pipelineId;

  // Prune old pipelines (keep last MAX_PIPELINES)
  const pipelineIds = Object.keys(state.pipelines);
  if (pipelineIds.length > MAX_PIPELINES) {
    const toRemove = pipelineIds.slice(0, pipelineIds.length - MAX_PIPELINES);
    toRemove.forEach(id => delete state.pipelines[id]);
  }

  renderPipelinePanel();
}

function buildPipelineStagesHTML(pipelineId, pipeline) {
  const stageOrder = pipeline.type === 'store' ? STORE_STAGES : SEARCH_STAGES;
  const reachedStages = new Set(pipeline.stages.map(s => s.stage));
  const stageDataMap = {};
  pipeline.stages.forEach(s => { stageDataMap[s.stage] = s; });

  const isComplete = reachedStages.has('complete');
  let lastReachedIdx = -1;
  stageOrder.forEach((s, i) => {
    if (reachedStages.has(s)) lastReachedIdx = i;
  });

  let stagesHTML = '';
  stageOrder.forEach((stageName, i) => {
    const reached = reachedStages.has(stageName);
    const isActive = !isComplete && !reached && i === lastReachedIdx + 1;
    const isSkipped = isComplete && !reached;
    let stateClass = '';
    if (reached) stateClass = 'reached';
    else if (isActive) stateClass = 'active';
    else if (isSkipped) stateClass = 'skipped';

    const label = STAGE_LABELS[stageName] || stageName;
    const stageData = stageDataMap[stageName];
    const timeStr = stageData ? `${stageData.duration_ms.toFixed(1)}ms` : '';

    if (i > 0) {
      const prevReached = reachedStages.has(stageOrder[i - 1]);
      const arrowClass = prevReached && reached ? 'pipeline-arrow reached' : 'pipeline-arrow';
      stagesHTML += `<div class="${arrowClass}"></div>`;
    }

    stagesHTML += `<div class="pipeline-stage ${stateClass}" onclick="toggleStageDetail('${pipelineId}', '${stageName}')">
      <div class="pipeline-dot"></div>
      <div class="pipeline-stage-label">${label}</div>
      ${timeStr ? `<div class="pipeline-stage-time">${timeStr}</div>` : '<div class="pipeline-stage-time">&nbsp;</div>'}
    </div>`;
  });

  return { stagesHTML, stageDataMap };
}

function renderPipelinePanel() {
  const panel = document.getElementById('pipeline-panel');
  const pipelineId = state.activePipeline;

  if (!pipelineId || !state.pipelines[pipelineId]) {
    panel.innerHTML = '<div class="pipeline-empty">No pipeline activity yet</div>';
    panel.removeAttribute('data-pipeline-id');
    return;
  }

  const pipeline = state.pipelines[pipelineId];
  const typeBadgeClass = pipeline.type === 'store' ? 'pipeline-type-store' : 'pipeline-type-search';
  const typeLabel = pipeline.type === 'store' ? 'STORE' : 'SEARCH';
  const durationStr = pipeline.total_duration_ms != null
    ? `${pipeline.total_duration_ms.toFixed(1)}ms`
    : 'running...';
  const agentStr = pipeline.agent_id ? escapeHtml(pipeline.agent_id) : '';

  const { stagesHTML, stageDataMap } = buildPipelineStagesHTML(pipelineId, pipeline);

  // Build detail section if a stage is expanded
  let detailHTML = '';
  if (state.expandedStage && state.expandedStage.pipelineId === pipelineId) {
    const sd = stageDataMap[state.expandedStage.stage];
    if (sd) {
      detailHTML = buildStageDetailHTML(sd);
    }
  }

  const currentRendered = panel.getAttribute('data-pipeline-id');

  if (currentRendered === pipelineId) {
    // Same pipeline — update in-place without rebuilding the card
    const dur = panel.querySelector('.pipeline-duration');
    if (dur) dur.textContent = durationStr;

    const stagesEl = panel.querySelector('.pipeline-stages');
    if (stagesEl) stagesEl.innerHTML = stagesHTML;

    // Update or insert detail section
    const existingDetail = panel.querySelector('.pipeline-stage-detail');
    if (existingDetail) existingDetail.remove();
    if (detailHTML) {
      const card = panel.querySelector('.pipeline-card');
      if (card) card.insertAdjacentHTML('beforeend', detailHTML);
    }
  } else {
    // New pipeline — full render with entrance animation
    panel.setAttribute('data-pipeline-id', pipelineId);
    panel.innerHTML = `<div class="pipeline-card pipeline-new">
      <div class="pipeline-header">
        <span class="pipeline-type-badge ${typeBadgeClass}">${typeLabel}</span>
        ${agentStr ? `<span class="pipeline-agent">${agentStr}</span>` : ''}
        <span class="pipeline-duration">${durationStr}</span>
      </div>
      <div class="pipeline-stages">${stagesHTML}</div>
      ${detailHTML}
    </div>`;
  }
}

function toggleStageDetail(pipelineId, stage) {
  if (state.expandedStage &&
      state.expandedStage.pipelineId === pipelineId &&
      state.expandedStage.stage === stage) {
    state.expandedStage = null;
  } else {
    state.expandedStage = { pipelineId, stage };
  }
  renderPipelinePanel();
}

function buildStageDetailHTML(stageInfo) {
  const d = stageInfo.data || {};
  const stageName = STAGE_LABELS[stageInfo.stage] || stageInfo.stage;

  // Build key-value rows from data, excluding internal fields and candidates
  const skipKeys = new Set([
    'pipeline_id', 'pipeline_type', 'stage', 'duration_ms', 'candidates',
  ]);
  const rows = Object.entries(d)
    .filter(([k]) => !skipKeys.has(k))
    .map(([k, v]) => {
      let displayVal = v;
      if (Array.isArray(v)) {
        displayVal = v.length > 0 ? v.join(', ') : '(none)';
      } else if (v === null || v === undefined) {
        displayVal = '—';
      } else if (typeof v === 'number') {
        displayVal = Number.isInteger(v) ? String(v) : v.toFixed(3);
      }
      const label = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return `<div class="pipeline-detail-row">
        <span class="pipeline-detail-key">${escapeHtml(label)}</span>
        <span class="pipeline-detail-value" title="${escapeHtml(String(v))}">${escapeHtml(String(displayVal))}</span>
      </div>`;
    }).join('');

  // Build candidate list (debug mode only)
  let candidateHTML = '';
  if (d.candidates && Array.isArray(d.candidates) && d.candidates.length > 0) {
    const isActr = stageInfo.stage === 'actr_scoring';
    const items = d.candidates.map((c, i) => {
      const score = typeof c.score === 'number' ? c.score.toFixed(3) : '—';
      let extraScores = '';
      if (isActr && c.total_activation !== undefined) {
        extraScores = `<span class="pipeline-candidate-scores">`
          + `bm25:${(c.bm25_score || 0).toFixed(2)}`
          + ` bl:${(c.base_level || 0).toFixed(2)}`
          + ` sp:${(c.spreading || 0).toFixed(2)}`
          + ` p:${(c.retrieval_prob || 0).toFixed(2)}`
          + `</span>`;
      }
      return `<div class="pipeline-candidate-item" title="${escapeHtml(c.id || '')}">
        <span class="pipeline-candidate-rank">#${i + 1}</span>
        <span class="pipeline-candidate-score">${score}</span>
        <span class="pipeline-candidate-content">${escapeHtml(c.content || c.id || '')}</span>
        ${extraScores}
      </div>`;
    }).join('');
    candidateHTML = `
      <div class="pipeline-candidates-header">Candidates (${d.candidates.length})</div>
      <div class="pipeline-candidates">${items}</div>`;
  }

  if (!rows && !candidateHTML) return '';

  return `<div class="pipeline-stage-detail">
    <div class="pipeline-stage-detail-title">${escapeHtml(stageName)} &middot; ${stageInfo.duration_ms.toFixed(2)}ms</div>
    ${rows}
    ${candidateHTML}
  </div>`;
}

// ── Utils ────────────────────────────────────────────────────────────
function formatTime(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('en-US', {
      hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  } catch { return ''; }
}

function formatTimeFull(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleString('en-US', {
      hour12: false, month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  } catch { return isoStr; }
}

function formatAge(seconds) {
  if (!seconds && seconds !== 0) return 'unknown';
  if (seconds < 60) return `${Math.round(seconds)}s`;
  if (seconds < 3600) return `${Math.round(seconds / 60)}m`;
  return `${Math.round(seconds / 3600)}h`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Filters ─────────────────────────────────────────────────────────

function buildFilters(nodes) {
  const entityTypes = [...new Set(nodes.filter(n => n.group === 'entity').map(n => n.type))].sort();
  const container = document.getElementById('graph-filters');

  // Reset filter state: all visible
  graphFilterState = {};
  entityTypes.forEach(t => { graphFilterState[t] = true; });
  graphFilterState['_memory'] = true;  // memory nodes toggle

  let html = '';
  entityTypes.forEach(t => {
    const color = getEntityColor(t);
    html += `<label class="graph-filter-item">
      <input type="checkbox" checked onchange="toggleFilter('${t}', this.checked)">
      <span class="graph-filter-dot" style="background:${color}"></span>
      ${t}
    </label>`;
  });
  // Memory toggle
  html += `<label class="graph-filter-item">
    <input type="checkbox" checked onchange="toggleFilter('_memory', this.checked)">
    <span class="graph-filter-dot" style="background:#6e7681"></span>
    memories
  </label>`;

  container.innerHTML = html;
}

function toggleFilter(type, checked) {
  graphFilterState[type] = checked;
  applyFilters();
}

function applyFilters() {
  const svg = d3.select('#graph-svg');

  svg.selectAll('.graph-node').each(function(d) {
    let visible;
    if (d.group === 'memory') {
      visible = graphFilterState['_memory'] !== false;
    } else {
      visible = graphFilterState[d.type] !== false;
    }
    d3.select(this).style('opacity', visible ? 1 : 0.05)
      .style('pointer-events', visible ? 'all' : 'none');
  });

  svg.selectAll('.graph-link').each(function(d) {
    const sourceVisible = d.source.group === 'memory'
      ? graphFilterState['_memory'] !== false
      : graphFilterState[d.source.type] !== false;
    const targetVisible = d.target.group === 'memory'
      ? graphFilterState['_memory'] !== false
      : graphFilterState[d.target.type] !== false;
    d3.select(this).style('opacity', (sourceVisible && targetVisible) ? 0.3 : 0.02);
  });
}

// ── Legend ───────────────────────────────────────────────────────────

function buildLegend(nodes) {
  const entityTypes = [...new Set(nodes.filter(n => n.group === 'entity').map(n => n.type))].sort();
  const legend = document.getElementById('graph-legend');
  let html = '<span style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Legend:</span>';

  entityTypes.forEach(t => {
    html += `<span class="graph-legend-item">
      <span class="graph-legend-swatch" style="background:${getEntityColor(t)}"></span>${t}
    </span>`;
  });

  // Memory types
  html += `<span class="graph-legend-item">
    <span class="graph-legend-swatch" style="background:#6e7681;width:7px;height:7px"></span>memory
  </span>`;
  html += `<span class="graph-legend-item">
    <span class="graph-legend-swatch" style="background:#fbbf24;width:7px;height:7px;box-shadow:0 0 6px #fbbf24"></span>insight
  </span>`;

  // Link types
  html += `<span class="graph-legend-item">
    <span class="graph-legend-line" style="background:#58a6ff"></span>entity→entity
  </span>`;
  html += `<span class="graph-legend-item">
    <span class="graph-legend-line" style="background:#6e7681;border-top:1px dashed #6e7681;height:0"></span>entity→memory
  </span>`;

  legend.innerHTML = html;
}

// ── D3 Rendering ────────────────────────────────────────────────────

function renderGraph(data) {
  const svgEl = document.getElementById('graph-svg');
  const rect = svgEl.getBoundingClientRect();
  const width = rect.width || 800;
  const height = rect.height || 600;

  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  // Defs for glow filter
  const defs = svg.append('defs');
  const glowFilter = defs.append('filter').attr('id', 'glow-insight');
  glowFilter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
  const merge = glowFilter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');

  // Container with zoom
  const g = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.2, 5])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });
  svg.call(zoom);

  // Links
  const link = g.selectAll('.graph-link')
    .data(data.links)
    .join('line')
    .attr('class', 'graph-link')
    .attr('stroke', d => d.type === 'linked' ? '#6e7681' : '#58a6ff')
    .attr('stroke-width', d => d.type === 'linked' ? 0.8 : 1.2)
    .attr('stroke-dasharray', d => d.type === 'linked' ? '3,3' : 'none')
    .attr('opacity', 0.3);

  // Node groups
  const node = g.selectAll('.graph-node')
    .data(data.nodes)
    .join('g')
    .attr('class', 'graph-node')
    .style('cursor', 'pointer')
    .on('click', (event, d) => onNodeClick(d))
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded));

  // Entity nodes: larger circles
  node.filter(d => d.group === 'entity')
    .append('circle')
    .attr('r', 8)
    .attr('fill', d => getEntityColor(d.type))
    .attr('stroke', d => d.type === 'keyword' ? '#f778ba' : 'none')
    .attr('stroke-width', d => d.type === 'keyword' ? 2 : 0)
    .attr('stroke-dasharray', d => d.type === 'keyword' ? '3,2' : 'none');

  // Entity labels
  node.filter(d => d.group === 'entity')
    .append('text')
    .text(d => d.name.length > 18 ? d.name.slice(0, 15) + '...' : d.name)
    .attr('x', 12)
    .attr('y', 4)
    .attr('fill', '#e6edf3')
    .attr('font-size', '9px')
    .style('pointer-events', 'none');

  // Memory nodes: smaller circles
  node.filter(d => d.group === 'memory')
    .append('circle')
    .attr('r', 5)
    .attr('fill', d => d.is_insight ? '#fbbf24' : getMemoryColor(d.type))
    .attr('filter', d => d.is_insight ? 'url(#glow-insight)' : 'none')
    .attr('opacity', 0.8);

  // Contradiction ring on memory nodes
  node.filter(d => d.group === 'memory' && (d.has_contradictions || d.is_contradicted))
    .append('circle')
    .attr('r', 7)
    .attr('fill', 'none')
    .attr('stroke', '#f85149')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '2,2');

  // Simulation
  graphSimulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => d.group === 'entity' ? 16 : 10))
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

// ── Drag Handlers ───────────────────────────────────────────────────

function dragStarted(event, d) {
  if (!event.active) graphSimulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragEnded(event, d) {
  if (!event.active) graphSimulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ── Search / Filter ─────────────────────────────────────────────────

function filterGraphNodes(query) {
  if (!graphData) return;
  const q = query.toLowerCase().trim();
  const svg = d3.select('#graph-svg');

  if (!q) {
    svg.selectAll('.graph-node').style('opacity', 1);
    svg.selectAll('.graph-link').style('opacity', 0.3);
    applyFilters();  // re-apply type filters
    return;
  }

  svg.selectAll('.graph-node').each(function(d) {
    const name = (d.name || '').toLowerCase();
    const match = name.includes(q);
    d3.select(this).style('opacity', match ? 1 : 0.08);
  });

  svg.selectAll('.graph-link').style('opacity', 0.05);
}

// ── Node Click ──────────────────────────────────────────────────────

function onNodeClick(d) {
  if (d.group === 'entity') {
    showEntityDetail(d);
  } else {
    showMemoryDetail(d);
  }
}

async function showEntityDetail(d) {
  const panel = document.getElementById('graph-detail-panel');
  panel.style.display = 'block';
  panel.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:40px">Loading...</div>';

  try {
    const resp = await fetch(`/api/graph/entity/${d.id}`);
    if (!resp.ok) throw new Error('Entity not found');
    const detail = await resp.json();
    const entity = detail.entity;
    const color = getEntityColor(entity.type);

    let html = `<button class="graph-detail-close" onclick="document.getElementById('graph-detail-panel').style.display='none'">&times;</button>`;
    html += `<div class="graph-detail-name">${escapeHtml(entity.name)}</div>`;
    html += `<span class="graph-detail-type" style="background:${color}20;color:${color};border:1px solid ${color}50">${entity.type}</span>`;

    if (entity.type === 'keyword') {
      html += ` <span class="graph-badge badge-keyword-bridge">keyword bridge</span>`;
    }

    // Attributes
    const attrs = entity.attributes || {};
    const attrKeys = Object.keys(attrs);
    if (attrKeys.length > 0) {
      html += `<div class="graph-detail-section">
        <div class="graph-detail-section-title">Attributes</div>`;
      attrKeys.forEach(k => {
        html += `<div class="graph-detail-attr">
          <span class="graph-detail-attr-key">${escapeHtml(k)}</span>
          <span class="graph-detail-attr-val">${escapeHtml(String(attrs[k]))}</span>
        </div>`;
      });
      html += '</div>';
    }

    // Connected memories
    if (detail.connected_memories.length > 0) {
      html += `<div class="graph-detail-section">
        <div class="graph-detail-section-title">Connected Memories (${detail.connected_memories.length})</div>
        <div class="graph-connected-memories-list">`;
      detail.connected_memories.forEach(m => {
        let badges = '';
        if (m.is_insight) badges += '<span class="graph-badge badge-insight">insight</span> ';
        if (m.has_contradictions) badges += '<span class="graph-badge badge-contradiction">contradicts</span> ';
        if (m.is_contradicted) badges += '<span class="graph-badge badge-contradiction">contradicted</span> ';
        html += `<div class="graph-detail-memory-item">
          ${escapeHtml(m.content)}
          <div class="graph-detail-memory-meta">
            ${badges}
            <span style="font-size:10px;color:var(--text-muted)">${m.type}${m.source_agent ? ' · ' + escapeHtml(m.source_agent) : ''}</span>
            ${m.domains && m.domains.length > 0 ? m.domains.map(d => `<span style="font-size:9px;padding:1px 5px;background:rgba(88,166,255,0.1);color:var(--accent-blue);border-radius:3px">${escapeHtml(d)}</span>`).join('') : ''}
          </div>
        </div>`;
      });
      html += '</div></div>';
    }

    // Connected entities
    if (detail.connected_entities.length > 0) {
      html += `<div class="graph-detail-section">
        <div class="graph-detail-section-title">Connected Entities (${detail.connected_entities.length})</div>`;
      detail.connected_entities.forEach(e => {
        const eColor = getEntityColor(e.type);
        const dirArrow = e.direction === 'outgoing' ? '→' : '←';
        html += `<div class="graph-detail-entity-item" onclick="navigateToEntity('${e.id}')">
          <span class="graph-detail-entity-dot" style="background:${eColor}"></span>
          <span class="graph-detail-entity-name">${escapeHtml(e.name)}</span>
          <span class="graph-detail-entity-rel">${escapeHtml(e.relationship_type)}</span>
          <span class="graph-detail-entity-dir">${dirArrow}</span>
        </div>`;
      });
      html += '</div>';
    }

    panel.innerHTML = html;
  } catch (e) {
    panel.innerHTML = `<button class="graph-detail-close" onclick="document.getElementById('graph-detail-panel').style.display='none'">&times;</button>
      <div style="color:var(--accent-red);padding:20px">Failed to load entity details</div>`;
  }
}

function showMemoryDetail(d) {
  const panel = document.getElementById('graph-detail-panel');
  panel.style.display = 'block';

  const color = getMemoryColor(d.type);
  let html = `<button class="graph-detail-close" onclick="document.getElementById('graph-detail-panel').style.display='none'">&times;</button>`;
  html += `<div class="graph-detail-name">${escapeHtml(d.name)}</div>`;
  html += `<span class="graph-detail-type" style="background:${color}20;color:${color};border:1px solid ${color}50">${d.type}</span>`;

  if (d.is_insight) {
    html += ` <span class="graph-badge badge-insight">consolidation insight</span>`;
  }
  if (d.has_contradictions) {
    html += ` <span class="graph-badge badge-contradiction">has contradictions</span>`;
  }
  if (d.is_contradicted) {
    html += ` <span class="graph-badge badge-contradiction">contradicted</span>`;
  }

  if (d.source_agent) {
    html += `<div class="graph-detail-section">
      <div class="graph-detail-section-title">Source</div>
      <div class="graph-detail-attr">
        <span class="graph-detail-attr-key">Agent</span>
        <span class="graph-detail-attr-val">${escapeHtml(d.source_agent)}</span>
      </div>
    </div>`;
  }

  if (d.domains && d.domains.length > 0) {
    html += `<div class="graph-detail-section">
      <div class="graph-detail-section-title">Domains</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${d.domains.map(dm => `<span class="domain-tag">${escapeHtml(dm)}</span>`).join('')}
      </div>
    </div>`;
  }

  panel.innerHTML = html;
}

function navigateToEntity(entityId) {
  if (!graphData) return;
  const node = graphData.nodes.find(n => n.id === entityId);
  if (node) {
    showEntityDetail(node);
  }
}

// ── Topics Panel ─────────────────────────────────────────────────────

function toggleTopicsPanel() {
  const panel = document.getElementById('topics-panel');
  if (panel.style.display === 'none') {
    loadTopics();
    panel.style.display = 'block';
  } else {
    panel.style.display = 'none';
  }
}

async function loadTopics() {
  const panel = document.getElementById('topics-panel');
  panel.innerHTML = '<div class="topics-empty">Loading...</div>';
  try {
    const resp = await fetch('/api/topics');
    const data = await resp.json();
    renderTopicsPanel(data);
  } catch (e) {
    panel.innerHTML = '<div class="topics-empty">Failed to load topics</div>';
  }
}

function renderTopicsPanel(data) {
  const panel = document.getElementById('topics-panel');
  const domains = data.domains || {};
  const universal = data.universal_labels || [];
  const domainKeys = Object.keys(domains).sort();

  let html = `<div class="topics-panel-header">
    <span class="topics-panel-title">Cached Entity Topics</span>
    <button class="topics-panel-close" onclick="document.getElementById('topics-panel').style.display='none'">&times;</button>
  </div>`;

  if (domainKeys.length > 0) {
    for (const domain of domainKeys) {
      const labels = domains[domain];
      html += `<div class="topics-domain">
        <div class="topics-domain-name">${escapeHtml(domain)}</div>
        <div class="topics-label-list">
          ${labels.map(l => `<span class="topics-label">${escapeHtml(l)}</span>`).join('')}
        </div>
      </div>`;
    }
  } else {
    html += '<div class="topics-empty">No domain-specific topics cached</div>';
  }

  // Always show universal labels as fallback reference
  html += `<div class="topics-domain">
    <div class="topics-domain-name" style="color:var(--text-muted)">Universal (fallback)</div>
    <div class="topics-label-list">
      ${universal.map(l => `<span class="topics-label universal">${escapeHtml(l)}</span>`).join('')}
    </div>
  </div>`;

  panel.innerHTML = html;
}
</script>

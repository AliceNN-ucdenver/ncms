# Researcher Agent — Semi-formal certificate pipeline with CoT
# plan_queries (LLM) → parallel_search (Tavily) → synthesize (LLM+CoT) → publish → verify
# Uses Meta semi-formal reasoning (arXiv:2603.01896) for traceable evidence chains

llms:
  spark_llm:
    _type: openai
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        project: ncms-researcher
        endpoint: "http://host.docker.internal:6006/v1/traces"

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: researcher
    domains: [research, market-analysis]
    subscribe_to: [product, requirements, architecture, trigger-researcher]

functions:
  research_agent:
    _type: research_agent
    llm_name: spark_llm
    hub_url: "http://host.docker.internal:9080"
    from_agent: researcher
    max_search_results: 5
    trigger_next_agent: true

workflow:
  _type: auto_memory_agent
  inner_agent_name: research_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Deep market research with deterministic LangGraph pipeline"
  retrieve_memory_for_every_response: false
  save_user_messages_to_memory: true
  save_ai_messages_to_memory: true
  search_params:
    top_k: 10

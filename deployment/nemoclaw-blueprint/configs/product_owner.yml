# Product Owner Agent — LangGraph deterministic PRD pipeline
# read_document → ask_experts → synthesize_prd → publish_prd → verify_and_trigger

llms:
  spark_llm:
    _type: openai
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 16384
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: otelcollector
        project: ncms-product-owner
        endpoint: "http://host.docker.internal:6006/v1/traces"
        resource_attributes:
          openinference.project.name: ncms-product-owner

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: product_owner
    domains: [product, requirements, research]
    subscribe_to: [architecture, security, identity-service, implementation]
    knowledge_paths:
      - path: /sandbox/knowledge/product-owner/
        domains: [product, requirements]

functions:
  prd_agent:
    _type: prd_agent
    llm_name: spark_llm
    hub_url: "http://host.docker.internal:9080"
    from_agent: product_owner
    trigger_next_agent: true

workflow:
  _type: auto_memory_agent
  inner_agent_name: prd_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Product owner with deterministic LangGraph PRD pipeline"
  retrieve_memory_for_every_response: false
  save_user_messages_to_memory: true
  save_ai_messages_to_memory: true
  search_params:
    top_k: 10

# Product Owner Agent — Semi-formal certificate PRD pipeline with CoT
# read_document → ask_experts → synthesize_prd (CoT) → manifest → publish → trigger

llms:
  spark_llm:
    _type: openai
    model_name: qwen35
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  spark_llm_thinking:
    _type: openai
    model_name: qwen35
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        project: ncms-product-owner
        endpoint: "http://host.docker.internal:6006/v1/traces"

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: product_owner
    domains: [product, requirements, research]
    subscribe_to: [architecture, security, identity-service, implementation, trigger-product_owner]
    knowledge_paths:
      - path: /sandbox/knowledge/product-owner/
        domains: [product, requirements]

functions:
  prd_agent:
    _type: prd_agent
    llm_name: spark_llm
    llm_thinking_name: spark_llm_thinking
    hub_url: "http://host.docker.internal:9080"
    from_agent: product_owner
    trigger_next_agent: true

workflow:
  _type: auto_memory_agent
  inner_agent_name: prd_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Product owner with deterministic LangGraph PRD pipeline"
  retrieve_memory_for_every_response: false
  save_user_messages_to_memory: true
  save_ai_messages_to_memory: true
  search_params:
    top_k: 10

# Architect Agent — LangGraph expert with dual-mode (knowledge + review)
# classify → search_memory → [synthesize_answer | structured_review]

llms:
  spark_llm:
    _type: openai
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: otelcollector
        project: ncms-architect
        endpoint: "http://host.docker.internal:6006/v1/traces"
        resource_attributes:
          openinference.project.name: ncms-architect

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: architect
    domains: [architecture, calm-model, quality, decisions]
    subscribe_to: [security, identity-service, implementation, trigger-architect]
    knowledge_paths:
      - path: /sandbox/knowledge/architecture/
        domains: [architecture, decisions]

functions:
  architect_expert:
    _type: architect_expert
    llm_name: spark_llm
    hub_url: "http://host.docker.internal:9080"
    from_agent: architect

workflow:
  _type: auto_memory_agent
  inner_agent_name: architect_expert
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Architect expert with LangGraph dual-mode (knowledge questions + design reviews)"
  retrieve_memory_for_every_response: false
  save_user_messages_to_memory: true
  save_ai_messages_to_memory: true
  search_params:
    top_k: 10

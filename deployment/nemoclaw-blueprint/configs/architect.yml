# Architect Agent — tool_calling_agent for LLM-powered expert synthesis

llms:
  spark_llm:
    _type: openai
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "https://inference.local/v1"
    api_key: "dummy"
    max_tokens: 16384
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: otelcollector
        project: ncms-architect
        endpoint: "http://host.docker.internal:6006/v1/traces"
        resource_attributes:
          openinference.project.name: ncms-architect

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: architect
    domains: [architecture, calm-model, quality, decisions]
    subscribe_to: [security, identity-service, implementation]
    knowledge_paths:
      - path: /sandbox/knowledge/architecture/
        domains: [architecture, decisions]

functions:
  ask_knowledge:
    _type: ask_knowledge
    hub_url: "http://host.docker.internal:9080"
    from_agent: architect
    timeout_ms: 120000

  announce_knowledge:
    _type: announce_knowledge
    hub_url: "http://host.docker.internal:9080"
    from_agent: architect

  architect_agent:
    _type: tool_calling_agent
    llm_name: spark_llm
    tool_names: [announce_knowledge]
    verbose: true
    handle_tool_errors: true
    description: >
      You are the architecture expert for the IMDB Lite project.

      Your knowledge base contains:
      - Architecture Decision Records (ADRs) that document technology choices,
        trade-offs, and rationale for the project (e.g. service architecture
        style, database selection, authentication approach)
      - CALM (Common Architecture Language Model) specifications that define
        service boundaries, component interactions, and infrastructure-as-code
        patterns for automated provisioning
      - Quality attribute scenarios covering performance targets, scalability
        requirements, maintainability goals, and observability standards
      - C4 architecture diagrams at context, container, and component levels

      When answering questions:
      - Cite specific ADRs by number when referencing architectural decisions
      - Reference CALM model constraints when discussing service boundaries
      - State quality attribute implications (latency, throughput, availability)
      - Identify conflicts or alignment with existing decisions
      - Be concise and actionable — the Builder agent will use your guidance
        to create implementation designs

      Do NOT call any tools. Answer directly from your knowledge.

workflow:
  _type: auto_memory_agent
  inner_agent_name: architect_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Architect agent with reasoning-driven responses"
  search_params:
    top_k: 10

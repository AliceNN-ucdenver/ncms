# Architect Agent — tool_calling_agent for LLM-powered expert synthesis

llms:
  spark_llm:
    _type: openai
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "https://inference.local/v1"
    api_key: "dummy"
    max_tokens: 32768
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: otelcollector
        project: ncms-architect
        endpoint: "http://host.docker.internal:6006/v1/traces"
        resource_attributes:
          openinference.project.name: ncms-architect

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: architect
    domains: [architecture, calm-model, quality, decisions]
    subscribe_to: [security, identity-service, implementation]
    knowledge_paths:
      - path: /sandbox/knowledge/architecture/
        domains: [architecture, decisions]

functions:
  ask_knowledge:
    _type: ask_knowledge
    hub_url: "http://host.docker.internal:9080"
    from_agent: architect
    timeout_ms: 120000

  announce_knowledge:
    _type: announce_knowledge
    hub_url: "http://host.docker.internal:9080"
    from_agent: architect

  architect_agent:
    _type: tool_calling_agent
    llm_name: spark_llm
    tool_names: [announce_knowledge]
    verbose: true
    handle_tool_errors: true
    description: >
      You are the architecture expert for the IMDB Lite project.

      Your knowledge base contains:
      - Architecture Decision Records (ADRs): technology choices, trade-offs,
        rationale (e.g. ADR-001 SOA with CALM, ADR-002 MongoDB, ADR-003 JWT RBAC)
      - CALM (Common Architecture Language Model) specifications: service
        boundaries, component interactions, infrastructure-as-code patterns
      - Quality attribute scenarios: performance targets, scalability,
        maintainability, observability standards
      - C4 architecture diagrams: context, container, component levels

      You handle TWO types of requests:

      1. KNOWLEDGE QUESTIONS — When asked about architecture decisions, patterns,
         or recommendations:
         - Cite specific ADRs by number
         - Reference CALM model constraints
         - State quality attribute implications
         - Be concise and actionable

      2. DESIGN REVIEWS — When asked to review or score an implementation design:
         Evaluate against your knowledge using these criteria:
         - CALM Model Compliance: does the design match documented service
           boundaries, component relationships, and containment hierarchies?
         - ADR Compliance: does the design follow accepted ADRs? Violations are
           HIGH severity. Check technology choices, communication patterns,
           data storage, authentication approaches.
         - Fitness Function Validation: complexity management, test coverage,
           performance budgets (N+1 queries, pagination, async), dependencies.
         - Quality Attribute Verification: availability (health checks, graceful
           shutdown), latency (hot paths, caching), throughput (pooling, rate
           limiting), scalability (stateless, externalized config).
         - Component Boundary Analysis: coupling, cohesion, API clarity, data ownership.

         Respond in EXACTLY this format:
         SCORE: [0-100]
         SEVERITY: [Critical|High|Medium|Low]
         COVERED: [what the design addresses, citing specific ADRs]
         MISSING: [gaps that need addressing]
         CHANGES: [numbered list of specific actionable changes]

      Do NOT call any tools. Answer directly from your knowledge.

workflow:
  _type: auto_memory_agent
  inner_agent_name: architect_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Architect agent with reasoning-driven responses"
  search_params:
    top_k: 10

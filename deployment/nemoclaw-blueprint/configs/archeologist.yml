# Archeologist Agent — Dual-path entry point for all projects
# Research path: plan_queries → parallel_search → arxiv → synthesize (CoT) → publish → verify
# Archaeology path: clone_and_index → analyze → gaps → web_research → synthesize → publish → verify

llms:
  spark_llm:
    _type: openai
    model_name: qwen35
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  spark_llm_thinking:
    _type: openai
    model_name: qwen35
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        project: ncms-archeologist
        endpoint: "http://host.docker.internal:6006/v1/traces"

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: archeologist
    domains: [research, market-analysis, archaeology, codebase-analysis]
    subscribe_to: [product, requirements, architecture, security, trigger-archeologist, trigger-researcher]

functions:
  archeologist_agent:
    _type: archeologist_agent
    llm_name: spark_llm
    llm_thinking_name: spark_llm_thinking
    hub_url: "http://host.docker.internal:9080"
    from_agent: archeologist
    max_search_results: 5
    trigger_next_agent: true

workflow:
  _type: auto_memory_agent
  inner_agent_name: archeologist_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Dual-path entry point: web research (Tavily+ArXiv) or codebase archaeology (GitHub)"
  retrieve_memory_for_every_response: false
  save_user_messages_to_memory: true
  save_ai_messages_to_memory: true
  search_params:
    top_k: 10

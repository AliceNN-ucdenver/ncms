# Security Agent — LangGraph expert with dual-mode (knowledge + review)
# classify → search_memory → [synthesize_answer | structured_review]
# No auto_memory wrapper — the LangGraph owns memory search via its
# search_memory node and recall_memory API calls.

llms:
  spark_llm:
    _type: openai
    model_name: nemotron-3-super
    base_url: "http://spark-ee7d.local:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        project: ncms-security
        endpoint: "http://host.docker.internal:6006/v1/traces"

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: security
    domains: [security, threats, compliance, controls]
    subscribe_to: [architecture, identity-service, implementation, trigger-security]
    knowledge_paths:
      - path: /sandbox/knowledge/security/
        domains: [security, threats]

workflow:
  _type: security_expert
  llm_name: spark_llm
  hub_url: "http://host.docker.internal:9080"
  from_agent: security

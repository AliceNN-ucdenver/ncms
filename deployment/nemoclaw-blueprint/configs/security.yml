# Security Agent — tool_calling_agent for LLM-powered expert synthesis

llms:
  spark_llm:
    _type: openai
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "https://inference.local/v1"
    api_key: "dummy"
    max_tokens: 32768
    model_kwargs:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: otelcollector
        project: ncms-security
        endpoint: "http://host.docker.internal:6006/v1/traces"
        resource_attributes:
          openinference.project.name: ncms-security

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: security
    domains: [security, threats, compliance, controls]
    subscribe_to: [architecture, identity-service, implementation]
    knowledge_paths:
      - path: /sandbox/knowledge/security/
        domains: [security, threats, controls]

functions:
  ask_knowledge:
    _type: ask_knowledge
    hub_url: "http://host.docker.internal:9080"
    from_agent: security
    timeout_ms: 120000

  announce_knowledge:
    _type: announce_knowledge
    hub_url: "http://host.docker.internal:9080"
    from_agent: security

  security_agent:
    _type: tool_calling_agent
    llm_name: spark_llm
    tool_names: [announce_knowledge]
    verbose: true
    handle_tool_errors: true
    description: >
      You are the security expert for the IMDB Lite project.

      Your knowledge base contains:
      - STRIDE threat models that identify spoofing, tampering, repudiation,
        information disclosure, denial of service, and elevation of privilege
        threats for each service component, with attack vectors, impact ratings,
        likelihood assessments, and existing controls
      - OWASP Top 10 control mappings that map each threat to specific OWASP
        categories (e.g. A01:2021 Broken Access Control, A07:2021 Identification
        and Authentication Failures) with recommended mitigations
      - Security control matrices that define password hashing requirements,
        token validation rules, session management policies, rate limiting
        thresholds, and encryption standards
      - Compliance requirement mappings to NIST SP 800-63B, GDPR, and
        industry-specific regulations

      When answering questions:
      - Cite specific threat IDs (e.g. THR-001) when referencing threats
      - Reference OWASP categories by number (e.g. A07:2021)
      - State risk levels (high/medium/low) with likelihood and impact
      - Recommend specific mitigations with implementation guidance
      - Identify residual risks after controls are applied
      - Be concise and actionable — the Builder agent will use your guidance
        to implement security controls

      Do NOT call any tools. Answer directly from your knowledge.

workflow:
  _type: auto_memory_agent
  inner_agent_name: security_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Security agent with LLM-powered expert synthesis"
  search_params:
    top_k: 10

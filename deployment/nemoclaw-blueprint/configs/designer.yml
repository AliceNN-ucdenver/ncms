# Designer Agent — LangGraph deterministic implementation design pipeline
# read_document → ask_experts → synthesize_design → publish_design → review ⟲ → verify

llms:
  spark_llm:
    _type: nim
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: "http://192.168.1.122:8000/v1"
    api_key: "dummy"
    max_tokens: 131072
    chat_template_kwargs:
      enable_thinking: false

general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        project: ncms-designer
        endpoint: "http://host.docker.internal:6006/v1/traces"

memory:
  ncms_store:
    _type: ncms_memory
    hub_url: "http://host.docker.internal:9080"
    agent_id: designer
    domains: [identity-service, implementation]
    subscribe_to: [architecture, security, product, requirements, trigger-designer, trigger-builder]

functions:
  design_agent:
    _type: design_agent
    llm_name: spark_llm
    hub_url: "http://host.docker.internal:9080"
    from_agent: designer
    quality_threshold: 80
    max_iterations: 5

workflow:
  _type: auto_memory_agent
  inner_agent_name: design_agent
  memory_name: ncms_store
  llm_name: spark_llm
  description: "Designer with deterministic LangGraph implementation design pipeline"
  retrieve_memory_for_every_response: false
  save_user_messages_to_memory: true
  save_ai_messages_to_memory: true
  search_params:
    top_k: 10

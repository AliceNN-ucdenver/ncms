# SPDX-License-Identifier: Apache-2.0
#
# NemoClaw Blueprint for NCMS Cognitive Memory System
# Compatible with NemoClaw Blueprint Runner protocol.

version: "0.1.0"
min_openshell_version: "0.1.0"
min_openclaw_version: "2026.3.0"
digest: ""  # Computed at release time

profiles:
  - default
  - ollama
  - nim
  - vllm

description: |
  NCMS Cognitive Memory System — persistent memory for AI agents with
  hybrid BM25+SPLADE+Graph retrieval, Knowledge Bus, and autonomous
  multi-agent design workflows via OpenClaw skills.

components:
  sandbox:
    image: "ncms-nemoclaw:latest"
    name: "ncms-openclaw"
    forward_ports:
      - 8420
      - 8080

  inference:
    profiles:
      default:
        provider_type: "openai"
        provider_name: "dgx-spark"
        endpoint: "http://spark-ee7d.local:8000/v1"
        model: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

      ollama:
        provider_type: "openai"
        provider_name: "ollama-local"
        endpoint: "http://host.docker.internal:11434"
        model: "qwen3.5:35b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

      nim:
        provider_type: "nvidia"
        provider_name: "nvidia-nim"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/llama-3.1-nemotron-70b-instruct"
        credential_env: "NVIDIA_API_KEY"

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        model: "nvidia/nemotron-3-nano-30b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

  policy:
    base: "policies/ncms-sandbox.yaml"
    additions:
      spark_service:
        name: spark_service
        endpoints:
          - host: "spark-ee7d.local"
            port: 8000
            protocol: rest
      ollama_service:
        name: ollama_service
        endpoints:
          - host: "host.docker.internal"
            port: 11434
            protocol: rest

  mcp:
    servers:
      ncms:
        command: "uv run ncms serve"
        description: "NCMS Cognitive Memory — store, search, recall, Knowledge Bus"

skills:
  - "skills/architect/architect.md"
  - "skills/security/security.md"
  - "skills/builder/builder.md"

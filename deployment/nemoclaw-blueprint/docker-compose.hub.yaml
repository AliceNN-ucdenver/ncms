# NCMS Hub + Phoenix — Docker services for NemoClaw multi-agent demo.
#
# The hub runs as a Docker container (outside NemoClaw) while agent sandboxes
# run inside NemoClaw and connect via host.docker.internal:9080.
#
# Phoenix provides tracing UI for NAT agent decision chains.
#
# Usage:
#   docker compose -f docker-compose.hub.yaml build [--build-arg HF_TOKEN=...]
#   docker compose -f docker-compose.hub.yaml up -d
#   docker compose -f docker-compose.hub.yaml down -v

services:
  ncms-hub:
    build:
      context: ../..
      dockerfile: deployment/nemoclaw-blueprint/hub.Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    container_name: ncms-hub
    env_file:
      - ../../.env
    ports:
      - "9080:9080"
      - "8420:8420"
    environment:
      # Ports
      NCMS_HUB_PORT: "9080"
      NCMS_DASHBOARD_PORT: "8420"
      # Inference (DGX Spark)
      NCMS_LLM_MODEL: "openai/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
      NCMS_LLM_API_BASE: "${INFERENCE_ENDPOINT:-http://host.docker.internal:8000/v1}"
      NCMS_CONSOLIDATION_KNOWLEDGE_MODEL: "openai/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
      NCMS_CONSOLIDATION_KNOWLEDGE_API_BASE: "${INFERENCE_ENDPOINT:-http://host.docker.internal:8000/v1}"
      # Features — Production bundle.  Phase E flag refactor
      # consolidated 7 per-phase booleans into one master
      # (NCMS_TEMPORAL_ENABLED).  See hub.Dockerfile for the full
      # doc — and note that NCMS_INTENT_SLOT_ENABLED /
      # NCMS_RECONCILIATION_ENABLED / NCMS_EPISODES_ENABLED /
      # NCMS_INTENT_CLASSIFICATION_ENABLED / NCMS_SLM_ENABLED are
      # DEAD env vars (silently ignored) since their respective
      # retirements.  Use NCMS_DEFAULT_ADAPTER_DOMAIN to drive the
      # SLM kill-switch.
      NCMS_SPLADE_ENABLED: "true"
      NCMS_RERANKER_ENABLED: "true"
      NCMS_ADMISSION_ENABLED: "true"
      NCMS_CONTRADICTION_DETECTION_ENABLED: "true"
      NCMS_CONTENT_CLASSIFICATION_ENABLED: "true"
      NCMS_TEMPORAL_ENABLED: "true"
      # 5-head SLM activation — single-tenant adapter selection.
      # Hub is single-tenant; software_dev adapter handles the
      # NemoClaw agents' architecture / code-pattern content.
      NCMS_SLM_POPULATE_DOMAINS: "true"
      NCMS_DEFAULT_ADAPTER_DOMAIN: "software_dev"
      # Maintenance & Learning
      NCMS_MAINTENANCE_ENABLED: "true"
      NCMS_SEARCH_FEEDBACK_ENABLED: "true"
      NCMS_PIPELINE_DEBUG: "true"
      # Consolidation (Phase 5) — requires LLM endpoint
      NCMS_CONSOLIDATION_KNOWLEDGE_ENABLED: "true"
      NCMS_EPISODE_CONSOLIDATION_ENABLED: "true"
      NCMS_TRAJECTORY_CONSOLIDATION_ENABLED: "true"
      NCMS_PATTERN_CONSOLIDATION_ENABLED: "true"
      # Dream cycles (Phase 8) — rehearsal + PMI associations + importance drift
      NCMS_DREAM_CYCLE_ENABLED: "true"
      # Bulk import (larger queue for agent knowledge loading)
      NCMS_BULK_IMPORT_QUEUE_SIZE: "10000"
      # HuggingFace token for gated models (SPLADE v3)
      HF_TOKEN: "${HF_TOKEN:-}"
    volumes:
      - ncms-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"
    restart: unless-stopped

volumes:
  ncms-data:

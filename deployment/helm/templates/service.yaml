apiVersion: v1
kind: Service
metadata:
  name: {{ include "ncms.fullname" . }}
  labels:
    {{- include "ncms.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if eq .Values.mode "dashboard" }}
    - port: {{ .Values.service.dashboardPort }}
      targetPort: dashboard
      protocol: TCP
      name: dashboard
    {{- end }}
  selector:
    {{- include "ncms.selectorLabels" . | nindent 4 }}

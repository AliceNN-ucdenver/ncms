apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ncms.fullname" . }}-config
  labels:
    {{- include "ncms.labels" . | nindent 4 }}
data:
  # NCMS configuration reference
  # These are also set as env vars in the deployment, but this ConfigMap
  # can be mounted or referenced by other pods (e.g., sidecar agents)
  NCMS_DB_PATH: {{ .Values.config.dbPath | quote }}
  NCMS_INDEX_PATH: {{ .Values.config.indexPath | quote }}
  NCMS_SPLADE_ENABLED: {{ .Values.config.spladeEnabled | quote }}
  NCMS_ADMISSION_ENABLED: {{ .Values.config.admissionEnabled | quote }}
  NCMS_RECONCILIATION_ENABLED: {{ .Values.config.reconciliationEnabled | quote }}
  NCMS_EPISODES_ENABLED: {{ .Values.config.episodesEnabled | quote }}
  NCMS_INTENT_CLASSIFICATION_ENABLED: {{ .Values.config.intentClassificationEnabled | quote }}
  NCMS_RERANKER_ENABLED: {{ .Values.config.rerankerEnabled | quote }}

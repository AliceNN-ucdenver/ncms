<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title    { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #555; font-style: italic; }
    .label    { font-size: 11px; fill: #333; }
    .small    { font-size: 10px; fill: #555; font-style: italic; }
    .box-text { font-size: 12px; fill: #111; font-weight: bold; }
    .box      { fill: #ffffff; stroke: #555; stroke-width: 1.5; }
    .grammar  { fill: #e6f5ea; stroke: #1f8a3f; }
    .bm25     { fill: #fff3e0; stroke: #d97706; }
    .high     { fill: #c4e8ce; stroke: #0e6e2a; stroke-width: 2; }
    .medium   { fill: #e6f5ea; stroke: #1f8a3f; stroke-width: 1.5; stroke-dasharray: 5,3; }
    .abstain  { fill: #fde8e8; stroke: #9b1c1c; stroke-width: 2; }
    .decision { fill: #fffde6; stroke: #666; }
    .arrow    { stroke: #333; stroke-width: 1.5; fill: none; }
    .thin     { stroke: #666; stroke-width: 1; fill: none; }
    .conf-high   { fill: #0e6e2a; font-weight: bold; }
    .conf-med    { fill: #1f8a3f; font-weight: bold; }
    .conf-low    { fill: #b06018; font-weight: bold; }
    .conf-abs    { fill: #9b1c1c; font-weight: bold; }
  </style>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" class="title">
    Composition invariant: grammar ∨ BM25
  </text>
  <text x="450" y="48" text-anchor="middle" class="subtitle">
    Grammar returns rank-1 only on confident paths · BM25 fallback preserves baseline
  </text>

  <!-- Query input -->
  <rect x="370" y="75" width="160" height="40" rx="6" class="box"/>
  <text x="450" y="99" text-anchor="middle" class="box-text">user query q</text>

  <!-- Two parallel paths start here -->
  <line x1="380" y1="115" x2="230" y2="160" class="arrow"/>
  <line x1="520" y1="115" x2="670" y2="160" class="arrow"/>

  <!-- Left path: Grammar -->
  <rect x="100" y="160" width="260" height="110" rx="6" class="grammar"/>
  <text x="230" y="182" text-anchor="middle" class="box-text">LG grammar (retrieve_lg)</text>
  <text x="230" y="205" text-anchor="middle" class="label">1. lookup_subject(q) → subject or None</text>
  <text x="230" y="222" text-anchor="middle" class="label">2. analyze_query(q) → intent + slots</text>
  <text x="230" y="239" text-anchor="middle" class="label">3. dispatch → grammar_answer + confidence</text>
  <text x="230" y="258" text-anchor="middle" class="small">(high / medium / low / abstain / none)</text>

  <!-- Right path: BM25 -->
  <rect x="540" y="160" width="260" height="110" rx="6" class="bm25"/>
  <text x="670" y="182" text-anchor="middle" class="box-text">BM25 / SPLADE retriever</text>
  <text x="670" y="205" text-anchor="middle" class="label">Standard hybrid retrieval</text>
  <text x="670" y="222" text-anchor="middle" class="label">returns ranked list bm25_full</text>
  <text x="670" y="258" text-anchor="middle" class="small">(always produces an answer)</text>

  <!-- Decision diamond -->
  <polygon points="450,290 540,330 450,370 360,330" class="decision"/>
  <text x="450" y="325" text-anchor="middle" class="box-text">has_confident_</text>
  <text x="450" y="340" text-anchor="middle" class="box-text">answer() ?</text>

  <line x1="230" y1="270" x2="390" y2="320" class="arrow"/>
  <line x1="670" y1="270" x2="510" y2="320" class="thin"/>

  <!-- Branch labels -->
  <text x="360" y="390" class="conf-high">YES (high / medium)</text>
  <text x="490" y="390" class="conf-abs">NO (low / abstain / none)</text>

  <!-- YES branch -->
  <rect x="100" y="410" width="280" height="100" rx="6" class="high"/>
  <text x="240" y="432" text-anchor="middle" class="box-text">Grammar-first ranking</text>
  <text x="240" y="455" text-anchor="middle" class="label">[grammar_answer]</text>
  <text x="240" y="472" text-anchor="middle" class="label">+ zone_context</text>
  <text x="240" y="489" text-anchor="middle" class="label">+ bm25_subject_scoped</text>
  <text x="240" y="506" text-anchor="middle" class="small">+ bm25_non_subject_tail</text>

  <!-- NO branch -->
  <rect x="520" y="410" width="280" height="100" rx="6" class="abstain"/>
  <text x="660" y="432" text-anchor="middle" class="box-text">BM25 ordering preserved</text>
  <text x="660" y="460" text-anchor="middle" class="label">return bm25_full unchanged</text>
  <text x="660" y="481" text-anchor="middle" class="small">grammar answer (if any) appears</text>
  <text x="660" y="495" text-anchor="middle" class="small">in full ranking but not prepended</text>

  <!-- Arrows from decision to branches -->
  <line x1="405" y1="360" x2="260" y2="410" class="arrow"/>
  <line x1="500" y1="360" x2="630" y2="410" class="arrow"/>

  <!-- Invariant callout -->
  <rect x="150" y="530" width="600" height="22" rx="4" fill="#fffee6" stroke="#cc9900"/>
  <text x="450" y="546" text-anchor="middle" class="label" font-weight="bold" fill="#663300">
    Proposition 1 (empirical): 0 / 500 confidently-wrong on LongMemEval · 95% Wilson upper ≤ 0.74%
  </text>
</svg>

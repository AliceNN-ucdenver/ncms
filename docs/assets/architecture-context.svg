<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="green2Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="subtleGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1020" height="580" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="510" y="24" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" letter-spacing="1">Architecture Context</text>
  <text x="510" y="38" text-anchor="middle" fill="#64748b" font-size="9">NCMS + NeMo Agent Toolkit + NemoClaw</text>

  <!-- ================================================================ -->
  <!-- Row 1: Agent Sandboxes (y=50..120)                               -->
  <!-- 5 boxes evenly spaced: x=155,305,455,605,755 (centers)          -->
  <!-- ================================================================ -->

  <!-- Researcher Agent -->
  <g filter="url(#shadow)">
    <rect x="85" y="50" width="140" height="60" rx="8" fill="#1a1e2e" stroke="#10b981" stroke-width="1.2"/>
    <rect x="85" y="50" width="140" height="20" rx="8" fill="url(#green2Grad)" opacity="0.9"/>
    <rect x="85" y="62" width="140" height="8" fill="url(#green2Grad)" opacity="0.9"/>
    <text x="155" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Researcher</text>
    <text x="155" y="84" text-anchor="middle" fill="#94a3b8" font-size="7.5">NemoClaw sandbox</text>
    <text x="155" y="100" text-anchor="middle" fill="#10b981" font-size="8" font-weight="500">:8005</text>
  </g>

  <!-- Product Owner Agent -->
  <g filter="url(#shadow)">
    <rect x="245" y="50" width="140" height="60" rx="8" fill="#1a1e2e" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="245" y="50" width="140" height="20" rx="8" fill="url(#greenGrad)" opacity="0.9"/>
    <rect x="245" y="62" width="140" height="8" fill="url(#greenGrad)" opacity="0.9"/>
    <text x="315" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Product Owner</text>
    <text x="315" y="84" text-anchor="middle" fill="#94a3b8" font-size="7.5">NemoClaw sandbox</text>
    <text x="315" y="100" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="500">:8004</text>
  </g>

  <!-- Builder Agent -->
  <g filter="url(#shadow)">
    <rect x="405" y="50" width="140" height="60" rx="8" fill="#1a1e2e" stroke="#f59e0b" stroke-width="1.2"/>
    <rect x="405" y="50" width="140" height="20" rx="8" fill="url(#amberGrad)" opacity="0.9"/>
    <rect x="405" y="62" width="140" height="8" fill="url(#amberGrad)" opacity="0.9"/>
    <text x="475" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Builder</text>
    <text x="475" y="84" text-anchor="middle" fill="#94a3b8" font-size="7.5">NemoClaw sandbox</text>
    <text x="475" y="100" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="500">:8003</text>
  </g>

  <!-- Architect Agent -->
  <g filter="url(#shadow)">
    <rect x="565" y="50" width="140" height="60" rx="8" fill="#1a1e2e" stroke="#3b82f6" stroke-width="1.2"/>
    <rect x="565" y="50" width="140" height="20" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="565" y="62" width="140" height="8" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="635" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Architect</text>
    <text x="635" y="84" text-anchor="middle" fill="#94a3b8" font-size="7.5">NemoClaw sandbox</text>
    <text x="635" y="100" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="500">:8001</text>
  </g>

  <!-- Security Agent -->
  <g filter="url(#shadow)">
    <rect x="725" y="50" width="140" height="60" rx="8" fill="#1a1e2e" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="725" y="50" width="140" height="20" rx="8" fill="url(#redGrad)" opacity="0.9"/>
    <rect x="725" y="62" width="140" height="8" fill="url(#redGrad)" opacity="0.9"/>
    <text x="795" y="64" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Security</text>
    <text x="795" y="84" text-anchor="middle" fill="#94a3b8" font-size="7.5">NemoClaw sandbox</text>
    <text x="795" y="100" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="500">:8002</text>
  </g>

  <!-- Vertical lines from agents DOWN to hub -->
  <line x1="155" y1="110" x2="155" y2="170" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <line x1="315" y1="110" x2="315" y2="170" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <line x1="475" y1="110" x2="475" y2="170" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="635" y1="110" x2="635" y2="170" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="795" y1="110" x2="795" y2="170" stroke="#ef4444" stroke-width="1" opacity="0.5"/>

  <!-- :9080 labels on agent-to-hub lines -->
  <text x="165" y="145" fill="#64748b" font-size="7">:9080</text>
  <text x="325" y="145" fill="#64748b" font-size="7">:9080</text>
  <text x="485" y="145" fill="#64748b" font-size="7">:9080</text>
  <text x="645" y="145" fill="#64748b" font-size="7">:9080</text>
  <text x="805" y="145" fill="#64748b" font-size="7">:9080</text>

  <!-- ================================================================ -->
  <!-- Row 2: NCMS Hub (y=170..395)                                     -->
  <!-- Hub spans x=120..870                                             -->
  <!-- ================================================================ -->
  <g filter="url(#shadow)">
    <rect x="120" y="170" width="750" height="225" rx="12" fill="url(#hubGrad)" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Hub header bar -->
    <rect x="120" y="170" width="750" height="30" rx="12" fill="url(#cyanGrad)" opacity="0.15"/>
    <rect x="120" y="192" width="750" height="8" fill="url(#cyanGrad)" opacity="0.15"/>
    <text x="495" y="189" text-anchor="middle" fill="#0ea5e9" font-size="14" font-weight="700" letter-spacing="1" filter="url(#subtleGlow)">NCMS Hub</text>
    <text x="845" y="188" text-anchor="end" fill="#475569" font-size="8">Docker :9080</text>
  </g>

  <!-- Hub internal components: 2x2 grid top row -->

  <!-- Memory Store -->
  <g filter="url(#subtleGlow)">
    <rect x="145" y="212" width="170" height="72" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="230" y="230" text-anchor="middle" fill="#f59e0b" font-size="9.5" font-weight="600">Memory Store</text>
    <text x="230" y="244" text-anchor="middle" fill="#94a3b8" font-size="7.5">SQLite (WAL mode)</text>
    <text x="230" y="256" text-anchor="middle" fill="#94a3b8" font-size="7.5">Tantivy BM25 (Rust)</text>
    <text x="230" y="268" text-anchor="middle" fill="#94a3b8" font-size="7.5">SPLADE v3 sparse neural</text>
  </g>

  <!-- Knowledge Bus -->
  <g filter="url(#subtleGlow)">
    <rect x="335" y="212" width="170" height="72" rx="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="1" opacity="0.9"/>
    <text x="420" y="230" text-anchor="middle" fill="#0ea5e9" font-size="9.5" font-weight="600">Knowledge Bus</text>
    <text x="420" y="246" text-anchor="middle" fill="#94a3b8" font-size="7.5">AsyncIO in-process</text>
    <text x="420" y="260" text-anchor="middle" fill="#94a3b8" font-size="7.5">ask / announce / subscribe</text>
  </g>

  <!-- Knowledge Graph -->
  <g filter="url(#subtleGlow)">
    <rect x="525" y="212" width="170" height="72" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
    <text x="610" y="230" text-anchor="middle" fill="#a855f7" font-size="9.5" font-weight="600">Knowledge Graph</text>
    <text x="610" y="246" text-anchor="middle" fill="#94a3b8" font-size="7.5">NetworkX DiGraph</text>
    <text x="610" y="260" text-anchor="middle" fill="#94a3b8" font-size="7.5">Spreading activation</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#subtleGlow)">
    <rect x="715" y="212" width="130" height="72" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="780" y="230" text-anchor="middle" fill="#10b981" font-size="9.5" font-weight="600">Dashboard</text>
    <text x="780" y="244" text-anchor="middle" fill="#94a3b8" font-size="7.5">SSE event feeds</text>
    <text x="780" y="256" text-anchor="middle" fill="#94a3b8" font-size="7.5">REST API</text>
    <text x="780" y="268" text-anchor="middle" fill="#94a3b8" font-size="7.5">SPA frontend</text>
  </g>

  <!-- Hub internal components: bottom row -->

  <!-- Document Store -->
  <g filter="url(#subtleGlow)">
    <rect x="200" y="300" width="190" height="58" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1" opacity="0.9"/>
    <text x="295" y="318" text-anchor="middle" fill="#f97316" font-size="9.5" font-weight="600">Document Store</text>
    <text x="295" y="333" text-anchor="middle" fill="#94a3b8" font-size="7.5">PRDs, designs, artifacts</text>
    <text x="295" y="347" text-anchor="middle" fill="#94a3b8" font-size="7.5">Published via bus events</text>
  </g>

  <!-- ML Models -->
  <g filter="url(#subtleGlow)">
    <rect x="560" y="300" width="190" height="58" rx="8" fill="#0f172a" stroke="#64748b" stroke-width="1" opacity="0.9"/>
    <text x="655" y="318" text-anchor="middle" fill="#cbd5e1" font-size="9.5" font-weight="600">ML Models</text>
    <text x="655" y="333" text-anchor="middle" fill="#94a3b8" font-size="7.5">GLiNER NER (209MB)</text>
    <text x="655" y="347" text-anchor="middle" fill="#94a3b8" font-size="7.5">Cross-encoder reranker</text>
  </g>

  <!-- ================================================================ -->
  <!-- Left side: DGX Spark (x=15, y=195..340)                         -->
  <!-- Positioned LEFT of hub, no overlap                               -->
  <!-- ================================================================ -->
  <g filter="url(#shadow)">
    <rect x="5" y="195" width="105" height="145" rx="8" fill="url(#sparkGrad)" stroke="#76b900" stroke-width="1.2"/>
    <rect x="5" y="195" width="105" height="22" rx="8" fill="#76b900" opacity="0.2"/>
    <rect x="5" y="209" width="105" height="8" fill="#76b900" opacity="0.2"/>
    <text x="57" y="210" text-anchor="middle" fill="#76b900" font-size="9" font-weight="700">DGX Spark</text>
    <text x="57" y="232" text-anchor="middle" fill="#94a3b8" font-size="7.5">vLLM server</text>
    <text x="57" y="246" text-anchor="middle" fill="#e2e8f0" font-size="7.5" font-weight="500">Nemotron Nano</text>
    <text x="57" y="259" text-anchor="middle" fill="#e2e8f0" font-size="7.5" font-weight="500">30B (3B active)</text>
    <text x="57" y="278" text-anchor="middle" fill="#64748b" font-size="7">qwen3_coder parser</text>
    <text x="57" y="293" text-anchor="middle" fill="#64748b" font-size="7">256K ctx | 128GB</text>
    <text x="57" y="318" text-anchor="middle" fill="#76b900" font-size="8" font-weight="500">:8000</text>
  </g>

  <!-- Spark to Hub: short horizontal arrow into left edge of hub -->
  <line x1="110" y1="260" x2="118" y2="260" stroke="#76b900" stroke-width="1.5" opacity="0.7"/>
  <polygon points="116,256 122,260 116,264" fill="#76b900" opacity="0.7"/>
  <text x="110" y="252" fill="#76b900" font-size="7" font-weight="500">LLM inference</text>

  <!-- Spark direct :8000 to agents: route OUTSIDE the hub -->
  <!-- Single vertical line up along left edge (x=12), then horizontal branches -->
  <!-- Vertical trunk: from Spark top up to agent level -->
  <line x1="12" y1="195" x2="12" y2="46" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Label on the vertical trunk -->
  <text x="18" y="135" fill="#76b900" font-size="6.5" font-weight="500" transform="rotate(-90,18,135)">direct :8000</text>
  <!-- Horizontal branches from trunk (x=12) to each agent bottom center -->
  <line x1="12" y1="80" x2="85" y2="80" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="12" y1="76" x2="245" y2="76" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="12" y1="72" x2="405" y2="72" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="12" y1="68" x2="565" y2="68" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="12" y1="64" x2="725" y2="64" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- ================================================================ -->
  <!-- Right side: External Services (x=885, y=195..340)                -->
  <!-- ================================================================ -->

  <!-- Tavily -->
  <g filter="url(#shadow)">
    <rect x="895" y="200" width="110" height="58" rx="8" fill="url(#sparkGrad)" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="950" y="222" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Tavily API</text>
    <text x="950" y="237" text-anchor="middle" fill="#94a3b8" font-size="7.5">Web search</text>
    <text x="950" y="250" text-anchor="middle" fill="#64748b" font-size="7">Researcher + PO</text>
  </g>

  <!-- Phoenix -->
  <g filter="url(#shadow)">
    <rect x="895" y="275" width="110" height="58" rx="8" fill="url(#sparkGrad)" stroke="#f472b6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="950" y="297" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="600">Phoenix</text>
    <text x="950" y="312" text-anchor="middle" fill="#94a3b8" font-size="7.5">OpenTelemetry</text>
    <text x="950" y="326" text-anchor="middle" fill="#f472b6" font-size="7" font-weight="500">:6006</text>
  </g>

  <!-- External service connections: dashed lines from hub right edge to services -->
  <line x1="870" y1="230" x2="895" y2="230" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="870" y1="304" x2="895" y2="304" stroke="#f472b6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ================================================================ -->
  <!-- Row 3: User (y=425..475)                                         -->
  <!-- ================================================================ -->
  <g filter="url(#shadow)">
    <rect x="420" y="425" width="150" height="50" rx="8" fill="url(#sparkGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <text x="495" y="449" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">User</text>
    <text x="495" y="464" text-anchor="middle" fill="#94a3b8" font-size="8">Browser / CLI</text>
  </g>

  <!-- User to Dashboard: arrow up into hub bottom -->
  <line x1="495" y1="425" x2="495" y2="397" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <polygon points="495,399 491,406 499,406" fill="#e2e8f0" opacity="0.5"/>
  <text x="505" y="415" fill="#64748b" font-size="7">:8420</text>

  <!-- ================================================================ -->
  <!-- Legend (bottom right)                                             -->
  <!-- ================================================================ -->
  <g transform="translate(550, 500)">
    <text x="0" y="0" fill="#64748b" font-size="8" font-weight="600">LEGEND</text>

    <line x1="0" y1="16" x2="24" y2="16" stroke="#94a3b8" stroke-width="1"/>
    <text x="30" y="19" fill="#64748b" font-size="7">Internal connection</text>

    <line x1="0" y1="30" x2="24" y2="30" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="30" y="33" fill="#64748b" font-size="7">External / direct API</text>

    <rect x="150" y="8" width="10" height="10" rx="2" fill="none" stroke="#22c55e" stroke-width="1"/>
    <text x="166" y="17" fill="#64748b" font-size="7">NemoClaw sandbox</text>

    <rect x="150" y="24" width="10" height="10" rx="2" fill="none" stroke="#0ea5e9" stroke-width="1"/>
    <text x="166" y="33" fill="#64748b" font-size="7">NCMS components</text>

    <rect x="290" y="8" width="10" height="10" rx="2" fill="none" stroke="#76b900" stroke-width="1"/>
    <text x="306" y="17" fill="#64748b" font-size="7">NVIDIA infrastructure</text>

    <rect x="290" y="24" width="10" height="10" rx="2" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="306" y="33" fill="#64748b" font-size="7">External services</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="subtleGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">Architecture Context</text>
  <text x="450" y="44" text-anchor="middle" fill="#64748b" font-size="10">NCMS + NeMo Agent Toolkit + NemoClaw</text>

  <!-- ════════════════════════════════════════ -->
  <!-- NemoClaw Sandboxes (Top Row)             -->
  <!-- ════════════════════════════════════════ -->

  <!-- PO Agent -->
  <g filter="url(#shadow)">
    <rect x="135" y="60" width="140" height="58" rx="8" fill="#1a1e2e" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="135" y="60" width="140" height="20" rx="8" fill="url(#greenGrad)" opacity="0.9"/>
    <rect x="135" y="72" width="140" height="8" fill="url(#greenGrad)" opacity="0.9"/>
    <text x="205" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Product Owner</text>
    <text x="205" y="93" text-anchor="middle" fill="#94a3b8" font-size="8">NemoClaw sandbox</text>
    <text x="205" y="108" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="500">:8004</text>
  </g>

  <!-- Builder Agent -->
  <g filter="url(#shadow)">
    <rect x="295" y="60" width="140" height="58" rx="8" fill="#1a1e2e" stroke="#f59e0b" stroke-width="1.2"/>
    <rect x="295" y="60" width="140" height="20" rx="8" fill="url(#amberGrad)" opacity="0.9"/>
    <rect x="295" y="72" width="140" height="8" fill="url(#amberGrad)" opacity="0.9"/>
    <text x="365" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Builder</text>
    <text x="365" y="93" text-anchor="middle" fill="#94a3b8" font-size="8">NemoClaw sandbox</text>
    <text x="365" y="108" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="500">:8003</text>
  </g>

  <!-- Architect Agent -->
  <g filter="url(#shadow)">
    <rect x="455" y="60" width="140" height="58" rx="8" fill="#1a1e2e" stroke="#3b82f6" stroke-width="1.2"/>
    <rect x="455" y="60" width="140" height="20" rx="8" fill="url(#blueGrad)" opacity="0.9"/>
    <rect x="455" y="72" width="140" height="8" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="525" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Architect</text>
    <text x="525" y="93" text-anchor="middle" fill="#94a3b8" font-size="8">NemoClaw sandbox</text>
    <text x="525" y="108" text-anchor="middle" fill="#3b82f6" font-size="8" font-weight="500">:8001</text>
  </g>

  <!-- Security Agent -->
  <g filter="url(#shadow)">
    <rect x="615" y="60" width="140" height="58" rx="8" fill="#1a1e2e" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="615" y="60" width="140" height="20" rx="8" fill="url(#redGrad)" opacity="0.9"/>
    <rect x="615" y="72" width="140" height="8" fill="url(#redGrad)" opacity="0.9"/>
    <text x="685" y="74" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Security</text>
    <text x="685" y="93" text-anchor="middle" fill="#94a3b8" font-size="8">NemoClaw sandbox</text>
    <text x="685" y="108" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="500">:8002</text>
  </g>

  <!-- Connection lines from agents to hub -->
  <line x1="205" y1="118" x2="205" y2="175" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <line x1="365" y1="118" x2="365" y2="175" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="525" y1="118" x2="525" y2="175" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="685" y1="118" x2="685" y2="175" stroke="#ef4444" stroke-width="1" opacity="0.5"/>

  <!-- Port labels on connections -->
  <text x="215" y="150" fill="#64748b" font-size="7">:9080</text>
  <text x="375" y="150" fill="#64748b" font-size="7">:9080</text>
  <text x="535" y="150" fill="#64748b" font-size="7">:9080</text>
  <text x="695" y="150" fill="#64748b" font-size="7">:9080</text>

  <!-- ════════════════════════════════════════ -->
  <!-- NCMS Hub (Center)                        -->
  <!-- ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="130" y="175" width="640" height="200" rx="12" fill="url(#hubGrad)" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Hub header bar -->
    <rect x="130" y="175" width="640" height="30" rx="12" fill="url(#cyanGrad)" opacity="0.15"/>
    <rect x="130" y="197" width="640" height="8" fill="url(#cyanGrad)" opacity="0.15"/>
    <text x="450" y="194" text-anchor="middle" fill="#0ea5e9" font-size="14" font-weight="700" letter-spacing="1" filter="url(#subtleGlow)">NCMS Hub</text>
    <text x="770" y="192" text-anchor="end" fill="#475569" font-size="8">Docker :9080</text>
  </g>

  <!-- Memory Store -->
  <g filter="url(#subtleGlow)">
    <rect x="155" y="218" width="175" height="68" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="243" y="237" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Memory Store</text>
    <text x="243" y="253" text-anchor="middle" fill="#94a3b8" font-size="8">SQLite (WAL mode)</text>
    <text x="243" y="265" text-anchor="middle" fill="#94a3b8" font-size="8">Tantivy BM25 (Rust)</text>
    <text x="243" y="277" text-anchor="middle" fill="#94a3b8" font-size="8">SPLADE v3 sparse neural</text>
  </g>

  <!-- Knowledge Bus -->
  <g filter="url(#subtleGlow)">
    <rect x="350" y="218" width="150" height="68" rx="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="1" opacity="0.9"/>
    <text x="425" y="237" text-anchor="middle" fill="#0ea5e9" font-size="10" font-weight="600">Knowledge Bus</text>
    <text x="425" y="255" text-anchor="middle" fill="#94a3b8" font-size="8">AsyncIO in-process</text>
    <text x="425" y="267" text-anchor="middle" fill="#94a3b8" font-size="8">ask / announce / subscribe</text>
  </g>

  <!-- Knowledge Graph -->
  <g filter="url(#subtleGlow)">
    <rect x="520" y="218" width="150" height="68" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
    <text x="595" y="237" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="600">Knowledge Graph</text>
    <text x="595" y="255" text-anchor="middle" fill="#94a3b8" font-size="8">NetworkX DiGraph</text>
    <text x="595" y="267" text-anchor="middle" fill="#94a3b8" font-size="8">Spreading activation</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#subtleGlow)">
    <rect x="155" y="300" width="175" height="55" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="243" y="319" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">Dashboard</text>
    <text x="243" y="333" text-anchor="middle" fill="#94a3b8" font-size="8">SSE event feeds + REST API</text>
    <text x="243" y="345" text-anchor="middle" fill="#94a3b8" font-size="8">SPA frontend + agent chat</text>
  </g>

  <!-- Document Store -->
  <g filter="url(#subtleGlow)">
    <rect x="350" y="300" width="150" height="55" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1" opacity="0.9"/>
    <text x="425" y="319" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">Document Store</text>
    <text x="425" y="335" text-anchor="middle" fill="#94a3b8" font-size="8">PRDs, designs, artifacts</text>
    <text x="425" y="347" text-anchor="middle" fill="#94a3b8" font-size="8">Published via bus events</text>
  </g>

  <!-- GLiNER + Cross-encoder -->
  <g filter="url(#subtleGlow)">
    <rect x="520" y="300" width="150" height="55" rx="8" fill="#0f172a" stroke="#64748b" stroke-width="1" opacity="0.9"/>
    <text x="595" y="319" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">ML Models</text>
    <text x="595" y="335" text-anchor="middle" fill="#94a3b8" font-size="8">GLiNER NER (209MB)</text>
    <text x="595" y="347" text-anchor="middle" fill="#94a3b8" font-size="8">Cross-encoder reranker</text>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- DGX Spark (Left)                         -->
  <!-- ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="15" y="185" width="100" height="140" rx="8" fill="url(#sparkGrad)" stroke="#76b900" stroke-width="1.2"/>
    <rect x="15" y="185" width="100" height="22" rx="8" fill="#76b900" opacity="0.2"/>
    <rect x="15" y="199" width="100" height="8" fill="#76b900" opacity="0.2"/>
    <text x="65" y="200" text-anchor="middle" fill="#76b900" font-size="9" font-weight="700">DGX Spark</text>
    <text x="65" y="225" text-anchor="middle" fill="#94a3b8" font-size="7.5">vLLM server</text>
    <text x="65" y="240" text-anchor="middle" fill="#e2e8f0" font-size="7.5" font-weight="500">Nemotron Nano</text>
    <text x="65" y="253" text-anchor="middle" fill="#e2e8f0" font-size="7.5" font-weight="500">30B (3B active)</text>
    <text x="65" y="272" text-anchor="middle" fill="#64748b" font-size="7">qwen3_coder parser</text>
    <text x="65" y="287" text-anchor="middle" fill="#64748b" font-size="7">65K ctx | 128GB</text>
    <text x="65" y="305" text-anchor="middle" fill="#76b900" font-size="7" font-weight="500">:8000</text>
  </g>

  <!-- DGX Spark connections -->
  <!-- Spark to Hub (solid, internal) -->
  <line x1="115" y1="255" x2="130" y2="255" stroke="#76b900" stroke-width="1.2" opacity="0.6"/>
  <!-- Spark to agents (dashed, through inference.local) -->
  <line x1="65" y1="185" x2="65" y2="140" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="65" y1="140" x2="135" y2="100" stroke="#76b900" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="80" y="137" fill="#64748b" font-size="6.5">inference.local</text>

  <!-- ════════════════════════════════════════ -->
  <!-- External Services (Right)                -->
  <!-- ════════════════════════════════════════ -->

  <!-- Tavily -->
  <g filter="url(#shadow)">
    <rect x="790" y="195" width="95" height="55" rx="8" fill="url(#sparkGrad)" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="838" y="217" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Tavily API</text>
    <text x="838" y="232" text-anchor="middle" fill="#94a3b8" font-size="7.5">Web search</text>
    <text x="838" y="244" text-anchor="middle" fill="#64748b" font-size="7">PO sandbox only</text>
  </g>

  <!-- Phoenix -->
  <g filter="url(#shadow)">
    <rect x="790" y="265" width="95" height="55" rx="8" fill="url(#sparkGrad)" stroke="#f472b6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="838" y="287" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="600">Phoenix</text>
    <text x="838" y="302" text-anchor="middle" fill="#94a3b8" font-size="7.5">OpenTelemetry</text>
    <text x="838" y="314" text-anchor="middle" fill="#f472b6" font-size="7" font-weight="500">:6006</text>
  </g>

  <!-- External service connections (dashed) -->
  <line x1="770" y1="222" x2="790" y2="222" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="770" y1="292" x2="790" y2="292" stroke="#f472b6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Tavily to PO agent dashed line -->
  <line x1="838" y1="195" x2="838" y2="100" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="838" y1="100" x2="275" y2="89" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- ════════════════════════════════════════ -->
  <!-- User (Bottom)                            -->
  <!-- ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="170" y="410" width="150" height="48" rx="8" fill="url(#sparkGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <text x="245" y="434" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">User</text>
    <text x="245" y="449" text-anchor="middle" fill="#94a3b8" font-size="8">Browser / CLI</text>
  </g>

  <!-- User to Dashboard -->
  <line x1="245" y1="410" x2="245" y2="375" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <polygon points="245,378 241,385 249,385" fill="#e2e8f0" opacity="0.5"/>
  <text x="258" y="396" fill="#64748b" font-size="7">:8420</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Legend                                    -->
  <!-- ════════════════════════════════════════ -->
  <g transform="translate(520, 415)">
    <text x="0" y="0" fill="#64748b" font-size="8" font-weight="600">LEGEND</text>
    <line x1="0" y1="14" x2="24" y2="14" stroke="#94a3b8" stroke-width="1"/>
    <text x="30" y="17" fill="#64748b" font-size="7">Internal connection</text>
    <line x1="0" y1="28" x2="24" y2="28" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="30" y="31" fill="#64748b" font-size="7">External API call</text>
    <rect x="140" y="6" width="10" height="10" rx="2" fill="none" stroke="#22c55e" stroke-width="1"/>
    <text x="156" y="15" fill="#64748b" font-size="7">NemoClaw sandbox</text>
    <rect x="140" y="22" width="10" height="10" rx="2" fill="none" stroke="#0ea5e9" stroke-width="1"/>
    <text x="156" y="31" fill="#64748b" font-size="7">NCMS components</text>
    <rect x="280" y="6" width="10" height="10" rx="2" fill="none" stroke="#76b900" stroke-width="1"/>
    <text x="296" y="15" fill="#64748b" font-size="7">NVIDIA infrastructure</text>
    <rect x="280" y="22" width="10" height="10" rx="2" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="296" y="31" fill="#64748b" font-size="7">External services</text>
  </g>
</svg>
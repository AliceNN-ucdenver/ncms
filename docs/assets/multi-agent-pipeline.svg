  <text x="85" y="144" fill="#8b7bae" font-size="9">BM25 (Tantivy/Rust) + SPLADE v3 Sparse Neural + Graph Spreading Activation</text>
  <text x="85" y="158" fill="#6b5b8e" font-size="9">nDCG@10 = 0.7206 on SciFact  |  Zero Vector DBs  |  Zero External API Calls</text>

  <!-- Hub internal chips along bottom of hub area -->
  <rect x="170" y="430" width="100" height="26" rx="6" fill="#12102a" stroke="#5a4a8a" stroke-width="1"/>

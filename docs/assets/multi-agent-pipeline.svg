<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0e3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="poGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e2a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e1a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a0e0e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1a0e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="humanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2a;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bb80ff" opacity="0.8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80" opacity="0.8"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" opacity="0.8"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171" opacity="0.8"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#bb80ff" font-size="22" font-weight="700" filter="url(#softGlow)">NCMS Multi-Agent Orchestration Pipeline</text>
  <text x="600" y="68" text-anchor="middle" fill="#8b8b9e" font-size="12">NeMo Cognitive Memory System + NeMo Agent Toolkit + NemoClaw Sandboxes</text>

  <!-- ═══════════════════ KNOWLEDGE HUB (center) ═══════════════════ -->
  <rect x="420" y="300" width="360" height="200" rx="16" fill="url(#hubGrad)" stroke="#bb80ff" stroke-width="2" opacity="0.95"/>
  <text x="600" y="330" text-anchor="middle" fill="#bb80ff" font-size="16" font-weight="700">NCMS Knowledge Hub</text>
  <text x="600" y="350" text-anchor="middle" fill="#8b8b9e" font-size="10">:9080 — Memory + Bus + Documents</text>

  <!-- Hub internals -->
  <rect x="440" y="365" width="100" height="35" rx="6" fill="#1a1040" stroke="#7c5cbf" stroke-width="1"/>
  <text x="490" y="387" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Memory Store</text>
  <text x="490" y="398" text-anchor="middle" fill="#8b8b9e" font-size="8">BM25 + SPLADE</text>

  <rect x="550" y="365" width="100" height="35" rx="6" fill="#1a1040" stroke="#7c5cbf" stroke-width="1"/>
  <text x="600" y="387" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Knowledge Bus</text>
  <text x="600" y="398" text-anchor="middle" fill="#8b8b9e" font-size="8">SSE + Ask/Announce</text>

  <rect x="660" y="365" width="100" height="35" rx="6" fill="#1a1040" stroke="#7c5cbf" stroke-width="1"/>
  <text x="710" y="387" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Document Store</text>
  <text x="710" y="398" text-anchor="middle" fill="#8b8b9e" font-size="8">PRDs + Designs</text>

  <!-- Knowledge Graph -->
  <rect x="440" y="410" width="155" height="35" rx="6" fill="#1a1040" stroke="#7c5cbf" stroke-width="1"/>
  <text x="517" y="432" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Knowledge Graph</text>
  <text x="517" y="443" text-anchor="middle" fill="#8b8b9e" font-size="8">NetworkX + Entities</text>

  <!-- Dashboard -->
  <rect x="605" y="410" width="155" height="35" rx="6" fill="#1a1040" stroke="#7c5cbf" stroke-width="1"/>
  <text x="682" y="432" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Dashboard</text>
  <text x="682" y="443" text-anchor="middle" fill="#8b8b9e" font-size="8">:8420 — SPA + SSE</text>

  <!-- Hub badge -->
  <rect x="440" y="455" width="320" height="30" rx="6" fill="#0e0820" stroke="#4a3680" stroke-width="1"/>
  <text x="600" y="474" text-anchor="middle" fill="#8b8b9e" font-size="9">SQLite (WAL) + Tantivy (Rust BM25) + SPLADE v3 Neural + ACT-R Scoring</text>

  <!-- ═══════════════════ AGENTS ═══════════════════ -->

  <!-- ARCHITECT (top left) -->
  <rect x="40" y="100" width="230" height="160" rx="12" fill="url(#archGrad)" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="65" cy="125" r="12" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="65" y="130" text-anchor="middle" fill="#60a5fa" font-size="14">A</text>
  <text x="90" y="130" fill="#60a5fa" font-size="14" font-weight="700">Architect</text>
  <text x="195" y="130" fill="#3b82f6" font-size="9" opacity="0.7">:8001</text>
  <rect x="55" y="140" width="60" height="18" rx="4" fill="#1e3a5f"/>
  <text x="85" y="153" text-anchor="middle" fill="#93c5fd" font-size="8">architecture</text>
  <rect x="120" y="140" width="50" height="18" rx="4" fill="#1e3a5f"/>
  <text x="145" y="153" text-anchor="middle" fill="#93c5fd" font-size="8">decisions</text>
  <rect x="175" y="140" width="45" height="18" rx="4" fill="#1e3a5f"/>
  <text x="197" y="153" text-anchor="middle" fill="#93c5fd" font-size="8">quality</text>
  <line x1="55" y1="168" x2="255" y2="168" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="55" y="183" fill="#8babc5" font-size="9">Seeds: ADR-001..003, CALM model,</text>
  <text x="55" y="195" fill="#8babc5" font-size="9">quality attributes, C4 diagrams</text>
  <text x="55" y="212" fill="#5b8bb5" font-size="9" font-style="italic">Tools: ask_knowledge</text>
  <text x="55" y="225" fill="#5b8bb5" font-size="9" font-style="italic">LLM: Nemotron Nano 30B</text>
  <text x="55" y="248" fill="#3b6a9f" font-size="8">NemoClaw Sandbox</text>

  <!-- SECURITY (top right) -->
  <rect x="930" y="100" width="230" height="160" rx="12" fill="url(#secGrad)" stroke="#f87171" stroke-width="1.5"/>
  <circle cx="955" cy="125" r="12" fill="#5f1e1e" stroke="#f87171" stroke-width="1.5"/>
  <text x="955" y="130" text-anchor="middle" fill="#f87171" font-size="14">S</text>
  <text x="980" y="130" fill="#f87171" font-size="14" font-weight="700">Security</text>
  <text x="1085" y="130" fill="#ef4444" font-size="9" opacity="0.7">:8002</text>
  <rect x="945" y="140" width="50" height="18" rx="4" fill="#5f1e1e"/>
  <text x="970" y="153" text-anchor="middle" fill="#fca5a5" font-size="8">security</text>
  <rect x="1000" y="140" width="45" height="18" rx="4" fill="#5f1e1e"/>
  <text x="1022" y="153" text-anchor="middle" fill="#fca5a5" font-size="8">threats</text>
  <rect x="1050" y="140" width="55" height="18" rx="4" fill="#5f1e1e"/>
  <text x="1077" y="153" text-anchor="middle" fill="#fca5a5" font-size="8">compliance</text>
  <line x1="945" y1="168" x2="1145" y2="168" stroke="#6a2a2a" stroke-width="0.5"/>
  <text x="945" y="183" fill="#c58b8b" font-size="9">Seeds: STRIDE threat model,</text>
  <text x="945" y="195" fill="#c58b8b" font-size="9">OWASP controls, security matrix</text>
  <text x="945" y="212" fill="#b55b5b" font-size="9" font-style="italic">Tools: ask_knowledge</text>
  <text x="945" y="225" fill="#b55b5b" font-size="9" font-style="italic">LLM: Nemotron Nano 30B</text>
  <text x="945" y="248" fill="#9f3b3b" font-size="8">NemoClaw Sandbox</text>

  <!-- PRODUCT OWNER (left) -->
  <rect x="40" y="360" width="230" height="180" rx="12" fill="url(#poGrad)" stroke="#4ade80" stroke-width="1.5"/>
  <circle cx="65" cy="385" r="12" fill="#1e5f3a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="65" y="390" text-anchor="middle" fill="#4ade80" font-size="14">P</text>
  <text x="90" y="390" fill="#4ade80" font-size="14" font-weight="700">Product Owner</text>
  <text x="195" y="390" fill="#22c55e" font-size="9" opacity="0.7">:8004</text>
  <rect x="55" y="400" width="50" height="18" rx="4" fill="#1e5f3a"/>
  <text x="80" y="413" text-anchor="middle" fill="#86efac" font-size="8">product</text>
  <rect x="110" y="400" width="65" height="18" rx="4" fill="#1e5f3a"/>
  <text x="142" y="413" text-anchor="middle" fill="#86efac" font-size="8">requirements</text>
  <rect x="180" y="400" width="50" height="18" rx="4" fill="#1e5f3a"/>
  <text x="205" y="413" text-anchor="middle" fill="#86efac" font-size="8">research</text>
  <line x1="55" y1="425" x2="255" y2="425" stroke="#2a6a4a" stroke-width="0.5"/>
  <text x="55" y="440" fill="#8bc5ab" font-size="9">Researches via Tavily web search</text>
  <text x="55" y="452" fill="#8bc5ab" font-size="9">Publishes PRD documents</text>
  <text x="55" y="469" fill="#5bb58b" font-size="9" font-style="italic">Tools: web_search, writeprd</text>
  <text x="55" y="482" fill="#5bb58b" font-size="9" font-style="italic">LLM: Nemotron Nano 30B</text>
  <text x="55" y="500" fill="#4a8b6b" font-size="8">Tavily API + NemoClaw Sandbox</text>
  <text x="55" y="528" fill="#3b9f6b" font-size="8">NemoClaw Sandbox</text>

  <!-- BUILDER (right) -->
  <rect x="930" y="360" width="230" height="180" rx="12" fill="url(#buildGrad)" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="955" cy="385" r="12" fill="#5f3a1e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="955" y="390" text-anchor="middle" fill="#f59e0b" font-size="14">B</text>
  <text x="980" y="390" fill="#f59e0b" font-size="14" font-weight="700">Builder</text>
  <text x="1085" y="390" fill="#d97706" font-size="9" opacity="0.7">:8003</text>
  <rect x="945" y="400" width="75" height="18" rx="4" fill="#5f3a1e"/>
  <text x="982" y="413" text-anchor="middle" fill="#fde68a" font-size="8">identity-service</text>
  <rect x="1025" y="400" width="75" height="18" rx="4" fill="#5f3a1e"/>
  <text x="1062" y="413" text-anchor="middle" fill="#fde68a" font-size="8">implementation</text>
  <line x1="945" y1="425" x2="1145" y2="425" stroke="#6a4a2a" stroke-width="0.5"/>
  <text x="945" y="440" fill="#c5ab8b" font-size="9">Consults architect + security</text>
  <text x="945" y="452" fill="#c5ab8b" font-size="9">Creates TypeScript impl designs</text>
  <text x="945" y="469" fill="#b58b5b" font-size="9" font-style="italic">Tools: ask_knowledge, writedesign</text>
  <text x="945" y="482" fill="#b58b5b" font-size="9" font-style="italic">LLM: Nemotron Nano 30B</text>
  <text x="945" y="500" fill="#8b6b4a" font-size="8">RCTRO Prompt Format</text>
  <text x="945" y="528" fill="#9f6b3b" font-size="8">NemoClaw Sandbox</text>

  <!-- HUMAN (bottom center) -->
  <rect x="460" y="560" width="280" height="90" rx="12" fill="url(#humanGrad)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="485" cy="585" r="12" fill="#2a2a4a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="485" y="590" text-anchor="middle" fill="#a78bfa" font-size="14">H</text>
  <text x="510" y="590" fill="#a78bfa" font-size="14" font-weight="700">Human</text>
  <rect x="475" y="600" width="80" height="18" rx="4" fill="#2a2a4a"/>
  <text x="515" y="613" text-anchor="middle" fill="#c4b5fd" font-size="8">human-approval</text>
  <text x="475" y="637" fill="#8b8bab" font-size="9">Dashboard UI: Chat, Approvals, Documents</text>

  <!-- ═══════════════════ FLOW ARROWS ═══════════════════ -->

  <!-- Step 1: Architect seeds knowledge -->
  <path d="M 155 260 Q 155 310 420 350" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <rect x="200" y="278" width="130" height="20" rx="4" fill="#0e1a3a" opacity="0.9"/>
  <text x="265" y="292" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">1  Seeds ADRs + Patterns</text>

  <!-- Step 2: Security seeds knowledge -->
  <path d="M 1045 260 Q 1045 310 780 350" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)" opacity="0.7"/>
  <rect x="850" y="278" width="140" height="20" rx="4" fill="#3a0e0e" opacity="0.9"/>
  <text x="920" y="292" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">2  Seeds Threat Model</text>

  <!-- Step 3: PO searches web + publishes PRD -->
  <path d="M 270 430 L 420 400" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)" filter="url(#softGlow)"/>
  <rect x="290" y="398" width="120" height="20" rx="4" fill="#0e2a1a" opacity="0.9"/>
  <text x="350" y="412" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">3  Publishes PRD</text>

  <!-- Tavily cloud -->
  <rect x="40" y="560" width="140" height="50" rx="10" fill="#0e2a1a" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="110" y="583" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Tavily Search</text>
  <text x="110" y="598" text-anchor="middle" fill="#3b9f6b" font-size="9">api.tavily.com</text>
  <path d="M 110 560 L 110 540 L 155 510" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGreen)" opacity="0.6"/>

  <!-- Step 4: Human reviews + clicks Send to Builder -->
  <path d="M 600 560 L 600 500" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <rect x="530" y="522" width="140" height="20" rx="4" fill="#1a1040" opacity="0.9"/>
  <text x="600" y="536" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">4  Reviews + Delegates</text>

  <!-- Step 5: Builder asks architect -->
  <path d="M 930 430 Q 600 200 270 180" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)" opacity="0.6"/>
  <rect x="540" y="195" width="130" height="20" rx="4" fill="#2a1a0e" opacity="0.9"/>
  <text x="605" y="209" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">5a  Asks Architect</text>

  <!-- Step 5b: Builder asks security -->
  <path d="M 1045 360 Q 1045 280 1045 260" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)" opacity="0.6"/>
  <rect x="1050" y="295" width="120" height="20" rx="4" fill="#2a1a0e" opacity="0.9"/>
  <text x="1110" y="309" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">5b  Asks Security</text>

  <!-- Step 6: Builder publishes design -->
  <path d="M 930 460 L 780 440" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)" filter="url(#softGlow)"/>
  <rect x="810" y="448" width="130" height="20" rx="4" fill="#2a1a0e" opacity="0.9"/>
  <text x="875" y="462" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">6  Publishes Design</text>

  <!-- DGX Spark -->
  <rect x="460" y="700" width="280" height="55" rx="10" fill="#0e1020" stroke="#7c5cbf" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="722" text-anchor="middle" fill="#bb80ff" font-size="11" font-weight="600">DGX Spark  —  Nemotron Nano 30B</text>
  <text x="600" y="740" text-anchor="middle" fill="#6b5b9e" font-size="9">vLLM + qwen3_coder tool calling  |  128 GB  |  65K context</text>
  <path d="M 600 700 L 600 660" fill="none" stroke="#7c5cbf" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>

  <!-- Phoenix -->
  <rect x="220" y="700" width="140" height="55" rx="10" fill="#0e1020" stroke="#7c5cbf" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="290" y="722" text-anchor="middle" fill="#bb80ff" font-size="11" font-weight="600">Phoenix Tracing</text>
  <text x="290" y="740" text-anchor="middle" fill="#6b5b9e" font-size="9">OpenTelemetry  :6006</text>

  <!-- Legend -->
  <rect x="840" y="700" width="320" height="55" rx="10" fill="#0e1020" stroke="#3a3a4a" stroke-width="1"/>
  <text x="860" y="720" fill="#8b8b9e" font-size="9">Pipeline Flow:</text>
  <line x1="940" y1="716" x2="970" y2="716" stroke="#4ade80" stroke-width="2"/>
  <text x="975" y="720" fill="#4ade80" font-size="9">PO → PRD</text>
  <line x1="1040" y1="716" x2="1070" y2="716" stroke="#f59e0b" stroke-width="2"/>
  <text x="1075" y="720" fill="#f59e0b" font-size="9">Builder → Design</text>
  <line x1="860" y1="740" x2="890" y2="740" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="895" y="744" fill="#60a5fa" font-size="9">Knowledge Seeding</text>
  <line x1="1020" y1="740" x2="1050" y2="740" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1055" y="744" fill="#a78bfa" font-size="9">Human Oversight</text>
</svg>

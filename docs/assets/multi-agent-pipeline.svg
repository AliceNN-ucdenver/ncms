  <rect x="75" y="175" width="225" height="160" rx="14" fill="url(#poGrad)" stroke="#4ade80" stroke-width="2" filter="url(#softGlow)"/>
  <!-- Title row -->
  <circle cx="103" cy="202" r="14" fill="#1a4a32" stroke="#4ade80" stroke-width="2"/>
  <text x="103" y="207" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700">PO</text>
  <text x="125" y="207" fill="#4ade80" font-size="13" font-weight="700">Product Owner</text>
  <line x1="90" y1="222" x2="285" y2="222" stroke="#2a5a3a" stroke-width="0.5"/>
  <!-- Detail text -->

  <!-- ════════════════════ ARROWS: BUILDER -> EXPERTS ════════════════════ -->

  <!-- Arrow: Builder top-right corner -> Architect (curves up and over to right) -->
  <path d="M 670 210 Q 720 170 768 175" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" filter="url(#softGlow)"/>


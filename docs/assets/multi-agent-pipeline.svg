  <text x="785" y="198" fill="#93c5fd" font-size="10">System design patterns</text>
  <text x="785" y="216" fill="#5b8bb5" font-size="9" font-style="italic">Seeds: ADRs, CALM, C4</text>
  <rect x="785" y="222" width="190" height="14" rx="4" fill="#0e1830"/>
  <text x="880" y="232" text-anchor="middle" fill="#3b6a9f" font-size="7">Port 8001</text>


  <rect x="285" y="430" width="100" height="26" rx="6" fill="#12102a" stroke="#5a4a8a" stroke-width="1"/>
  <text x="335" y="447" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Knowledge Bus</text>

  <rect x="400" y="430" width="110" height="26" rx="6" fill="#12102a" stroke="#5a4a8a" stroke-width="1"/>
  <text x="455" y="447" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Knowledge Graph</text>

  <rect x="525" y="430" width="105" height="26" rx="6" fill="#12102a" stroke="#5a4a8a" stroke-width="1"/>
  <text x="577" y="447" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Document Store</text>

  <rect x="645" y="430" width="90" height="26" rx="6" fill="#12102a" stroke="#5a4a8a" stroke-width="1"/>
  <text x="690" y="447" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Dashboard</text>

  <rect x="750" y="430" width="80" height="26" rx="6" fill="#12102a" stroke="#5a4a8a" stroke-width="1"/>
  <text x="790" y="447" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">ACT-R</text>


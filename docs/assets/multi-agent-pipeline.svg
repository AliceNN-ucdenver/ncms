  <rect x="55" y="100" width="1090" height="370" rx="20" fill="url(#hubGrad)" stroke="#7c5cbf" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Hub label top-left -->

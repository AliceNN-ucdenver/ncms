  <text x="555" y="489" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="700">Phase 3</text>

  <rect x="835" y="475" width="100" height="20" rx="5" fill="#12102a" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
  <text x="885" y="489" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="700">Phase 4</text>


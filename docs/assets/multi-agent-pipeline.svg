  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)" rx="12"/>

  <!-- ════════════════════ TITLE ════════════════════ -->
  <text x="600" y="38" text-anchor="middle" fill="#e2d5ff" font-size="22" font-weight="700" filter="url(#softGlow)">Multi-Agent Software Delivery Pipeline</text>
  <text x="600" y="58" text-anchor="middle" fill="#8b7bae" font-size="11">Research to Implementation Design  |  4 Agents  |  Shared Persistent Memory  |  Full Observability</text>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="1">NCMS Architecture</text>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">Clean Architecture / Protocol-Based / Zero External Dependencies</text>

  <!-- Agent Layer -->
  <g filter="url(#shadow)">
    <!-- API Agent -->
    <rect x="60" y="85" width="220" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="60" y="85" width="220" height="28" rx="10" fill="url(#headerGrad)"/>
    <rect x="60" y="103" width="220" height="10" fill="url(#headerGrad)"/>
    <text x="170" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="600">API Agent</text>
    <text x="170" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">api : api:user-service</text>
    <text x="170" y="145" text-anchor="middle" fill="#94a3b8" font-size="10">api:auth-service</text>
    <circle cx="252" cy="96" r="6" fill="#22c55e"/>
    <text x="252" y="99" text-anchor="middle" fill="#0f172a" font-size="8" font-weight="700">L</text>

    <!-- Frontend Agent -->
    <rect x="340" y="85" width="220" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="340" y="85" width="220" height="28" rx="10" fill="url(#headerGrad)"/>
    <rect x="340" y="103" width="220" height="10" fill="url(#headerGrad)"/>
    <text x="450" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="600">Frontend Agent</text>
    <text x="450" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">frontend : ui:components</text>
    <text x="450" y="145" text-anchor="middle" fill="#94a3b8" font-size="10">ui:pages</text>
    <circle cx="532" cy="96" r="6" fill="#22c55e"/>
    <text x="532" y="99" text-anchor="middle" fill="#0f172a" font-size="8" font-weight="700">L</text>

    <!-- DB Agent -->
    <rect x="620" y="85" width="220" height="90" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="620" y="85" width="220" height="28" rx="10" fill="url(#headerGrad)"/>
    <rect x="620" y="103" width="220" height="10" fill="url(#headerGrad)"/>
    <text x="730" y="104" text-anchor="middle" fill="white" font-size="13" font-weight="600">Database Agent</text>
    <text x="730" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">db : db:user-schema</text>
    <text x="730" y="145" text-anchor="middle" fill="#94a3b8" font-size="10">db:auth-schema : db:migrations</text>
    <circle cx="812" cy="96" r="6" fill="#f59e0b"/>
    <text x="812" y="99" text-anchor="middle" fill="#0f172a" font-size="8" font-weight="700">S</text>
  </g>

  <!-- Connection lines from agents to bus -->
  <line x1="170" y1="175" x2="170" y2="210" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="450" y1="175" x2="450" y2="210" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="730" y1="175" x2="730" y2="210" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Knowledge Bus -->
  <g filter="url(#shadow)">
    <rect x="40" y="210" width="820" height="80" rx="12" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="40" y="210" width="820" height="30" rx="12" fill="url(#busGrad)"/>
    <rect x="40" y="230" width="820" height="10" fill="url(#busGrad)"/>
    <text x="450" y="232" text-anchor="middle" fill="white" font-size="15" font-weight="700">Knowledge Bus</text>
    <text x="450" y="250" text-anchor="middle" fill="white" font-size="10" opacity="0.7">AsyncIO In-Process Event Bus</text>

    <!-- Bus features -->
    <rect x="80" y="262" width="130" height="22" rx="11" fill="#0369a1" opacity="0.8"/>
    <text x="145" y="277" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="500">Ask / Respond</text>

    <rect x="240" y="262" width="130" height="22" rx="11" fill="#0369a1" opacity="0.8"/>
    <text x="305" y="277" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="500">Announce / Subscribe</text>

    <rect x="400" y="262" width="130" height="22" rx="11" fill="#0369a1" opacity="0.8"/>
    <text x="465" y="277" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="500">Domain Router</text>

    <rect x="560" y="262" width="130" height="22" rx="11" fill="#0369a1" opacity="0.8"/>
    <text x="625" y="277" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="500">Surrogate Dispatch</text>

    <rect x="720" y="262" width="100" height="22" rx="11" fill="#0369a1" opacity="0.8"/>
    <text x="770" y="277" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="500">Agent Inbox</text>
  </g>

  <!-- Connection to memory core -->
  <line x1="450" y1="290" x2="450" y2="330" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Cognitive Memory Core -->
  <g filter="url(#shadow)">
    <rect x="100" y="330" width="700" height="155" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="100" y="330" width="700" height="30" rx="12" fill="url(#memGrad)"/>
    <rect x="100" y="350" width="700" height="10" fill="url(#memGrad)"/>
    <text x="450" y="351" text-anchor="middle" fill="white" font-size="15" font-weight="700">Cognitive Memory Core</text>

    <!-- Tier 1 -->
    <rect x="130" y="375" width="195" height="95" rx="8" fill="#292524" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="227" y="395" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Tier 1: BM25 Search</text>
    <text x="227" y="414" text-anchor="middle" fill="#a8a29e" font-size="10">Tantivy (Rust Engine)</text>
    <text x="227" y="432" text-anchor="middle" fill="#a8a29e" font-size="10">Exact lexical matching</text>
    <text x="227" y="450" text-anchor="middle" fill="#a8a29e" font-size="10">English stemming</text>
    <rect x="175" y="458" width="105" height="6" rx="3" fill="#f59e0b" opacity="0.4"/>

    <!-- Tier 2 -->
    <rect x="353" y="375" width="195" height="95" rx="8" fill="#292524" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="450" y="395" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Tier 2: Knowledge Graph</text>
    <text x="450" y="414" text-anchor="middle" fill="#a8a29e" font-size="10">NetworkX DiGraph</text>
    <text x="450" y="432" text-anchor="middle" fill="#a8a29e" font-size="10">Entity resolution</text>
    <text x="450" y="450" text-anchor="middle" fill="#a8a29e" font-size="10">Multi-hop traversal</text>
    <rect x="398" y="458" width="105" height="6" rx="3" fill="#f59e0b" opacity="0.4"/>

    <!-- Tier 3 -->
    <rect x="576" y="375" width="195" height="95" rx="8" fill="#292524" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="673" y="395" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Tier 3: ACT-R Scoring</text>
    <text x="673" y="414" text-anchor="middle" fill="#a8a29e" font-size="10">Cognitive activation math</text>
    <text x="673" y="432" text-anchor="middle" fill="#a8a29e" font-size="10">Recency + frequency decay</text>
    <text x="673" y="450" text-anchor="middle" fill="#a8a29e" font-size="10">Spreading activation</text>
    <rect x="621" y="458" width="105" height="6" rx="3" fill="#f59e0b" opacity="0.4"/>
  </g>

  <!-- Arrows between tiers -->
  <path d="M 325 422 L 345 422" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowGold)"/>
  <path d="M 548 422 L 568 422" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowGold)"/>
  <defs>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Connection to storage -->
  <line x1="450" y1="485" x2="450" y2="525" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Storage Layer -->
  <g filter="url(#shadow)">
    <rect x="150" y="525" width="600" height="70" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="150" y="525" width="600" height="28" rx="12" fill="url(#storeGrad)"/>
    <rect x="150" y="543" width="600" height="10" fill="url(#storeGrad)"/>
    <text x="450" y="545" text-anchor="middle" fill="white" font-size="14" font-weight="700">SQLite Storage (Embedded, WAL Mode)</text>

    <!-- Table pills -->
    <rect x="185" y="565" width="80" height="20" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="225" y="579" text-anchor="middle" fill="#6ee7b7" font-size="9">memories</text>

    <rect x="280" y="565" width="70" height="20" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="315" y="579" text-anchor="middle" fill="#6ee7b7" font-size="9">entities</text>

    <rect x="365" y="565" width="95" height="20" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="412" y="579" text-anchor="middle" fill="#6ee7b7" font-size="9">relationships</text>

    <rect x="475" y="565" width="80" height="20" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="515" y="579" text-anchor="middle" fill="#6ee7b7" font-size="9">access_log</text>

    <rect x="570" y="565" width="80" height="20" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="610" y="579" text-anchor="middle" fill="#6ee7b7" font-size="9">snapshots</text>

    <rect x="665" y="565" width="60" height="20" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="695" y="579" text-anchor="middle" fill="#6ee7b7" font-size="9">graph</text>
  </g>

  <!-- MCP / CLI sidebar -->
  <g filter="url(#shadow)">
    <rect x="40" y="330" width="50" height="155" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="65" y="395" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600" transform="rotate(-90 65 395)">MCP Server</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="810" y="330" width="50" height="155" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="835" y="395" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600" transform="rotate(90 835 395)">CLI / Hooks</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 625)">
    <circle cx="10" cy="8" r="6" fill="#22c55e"/>
    <text x="10" y="11" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="700">L</text>
    <text x="22" y="12" fill="#94a3b8" font-size="10">Live</text>
    <circle cx="60" cy="8" r="6" fill="#f59e0b"/>
    <text x="60" y="11" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="700">S</text>
    <text x="72" y="12" fill="#94a3b8" font-size="10">Sleeping</text>
    <circle cx="120" cy="8" r="6" fill="#ef4444"/>
    <text x="120" y="11" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="700">O</text>
    <text x="132" y="12" fill="#94a3b8" font-size="10">Offline</text>
  </g>
  <text x="860" y="650" text-anchor="end" fill="#475569" font-size="9">ncms v0.1.0</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="qGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="t0Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="t1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="t15Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="t2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="ds" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="400" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Retrieval Pipeline</text>
  <text x="480" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Intent-classified cognitive retrieval with graph expansion, dream-learned weights, and zero LLM at query time</text>

  <!-- Query Input -->
  <g filter="url(#ds)">
    <rect x="12" y="70" width="95" height="185" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="12" y="70" width="95" height="28" rx="10" fill="url(#qGrad)"/>
    <rect x="12" y="90" width="95" height="8" fill="url(#qGrad)"/>
    <text x="59" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="600">Query</text>
    <text x="59" y="118" text-anchor="middle" fill="#c4b5fd" font-size="20">"</text>
    <text x="59" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">connection</text>
    <text x="59" y="154" text-anchor="middle" fill="#94a3b8" font-size="9">pooling config</text>
    <text x="59" y="178" text-anchor="middle" fill="#c4b5fd" font-size="20">"</text>
    <text x="59" y="240" text-anchor="middle" fill="#64748b" font-size="8">domain: db</text>
  </g>

  <!-- Arrow Q -> T0 -->
  <line x1="107" y1="162" x2="125" y2="162" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tier 0: Intent Classification -->
  <g filter="url(#ds)">
    <rect x="130" y="70" width="150" height="185" rx="10" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
    <rect x="130" y="70" width="150" height="28" rx="10" fill="url(#t0Grad)"/>
    <rect x="130" y="90" width="150" height="8" fill="url(#t0Grad)"/>
    <text x="205" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="600">Tier 0: Intent</text>
    <text x="205" y="115" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="500">BM25 Exemplar Index</text>
    <text x="205" y="135" text-anchor="middle" fill="#94a3b8" font-size="9">Query classification</text>
    <text x="205" y="150" text-anchor="middle" fill="#94a3b8" font-size="9">Shapes downstream scoring</text>

    <!-- Intent type pills -->
    <rect x="142" y="165" width="58" height="13" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="171" y="175" text-anchor="middle" fill="#5eead4" font-size="6">fact_lookup</text>
    <rect x="204" y="165" width="65" height="13" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="236" y="175" text-anchor="middle" fill="#5eead4" font-size="6">current_state</text>
    <rect x="142" y="182" width="55" height="13" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="169" y="192" text-anchor="middle" fill="#5eead4" font-size="6">historical</text>
    <rect x="201" y="182" width="68" height="13" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="235" y="192" text-anchor="middle" fill="#5eead4" font-size="6">event_recon</text>
    <rect x="142" y="199" width="70" height="13" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="177" y="209" text-anchor="middle" fill="#5eead4" font-size="6">change_detect</text>
    <rect x="216" y="199" width="52" height="13" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="242" y="209" text-anchor="middle" fill="#5eead4" font-size="6">strategic</text>

    <text x="205" y="237" text-anchor="middle" fill="#14b8a6" font-size="10" font-weight="500">7 intent classes</text>
    <text x="205" y="250" text-anchor="middle" fill="#64748b" font-size="8">~0.5ms</text>
  </g>

  <!-- Arrow T0 -> T1 -->
  <line x1="280" y1="162" x2="298" y2="162" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tier 1: BM25 + SPLADE -->
  <g filter="url(#ds)">
    <rect x="303" y="70" width="155" height="185" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="303" y="70" width="155" height="28" rx="10" fill="url(#t1Grad)"/>
    <rect x="303" y="90" width="155" height="8" fill="url(#t1Grad)"/>
    <text x="380" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="600">Tier 1: BM25 + SPLADE</text>
    <text x="380" y="115" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="500">Tantivy + Sparse Neural</text>
    <text x="380" y="135" text-anchor="middle" fill="#94a3b8" font-size="9">Lexical + neural matching</text>
    <text x="380" y="150" text-anchor="middle" fill="#94a3b8" font-size="9">RRF fusion scoring</text>
    <text x="380" y="165" text-anchor="middle" fill="#94a3b8" font-size="9">Domain filtering</text>
    <text x="380" y="195" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">50 candidates</text>
    <rect x="328" y="210" width="105" height="4" rx="2" fill="#0ea5e9" opacity="0.5"/>
    <text x="380" y="240" text-anchor="middle" fill="#64748b" font-size="8">~1ms</text>
  </g>

  <!-- Arrow T1 -> T1.5 -->
  <line x1="458" y1="162" x2="476" y2="162" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tier 1.5: Graph Expansion -->
  <g filter="url(#ds)">
    <rect x="481" y="70" width="165" height="185" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <rect x="481" y="70" width="165" height="28" rx="10" fill="url(#t15Grad)"/>
    <rect x="481" y="90" width="165" height="8" fill="url(#t15Grad)"/>
    <text x="563" y="90" text-anchor="middle" fill="white" font-size="10" font-weight="600">Tier 1.5: Graph</text>
    <text x="563" y="115" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="500">NetworkX DiGraph</text>
    <text x="563" y="135" text-anchor="middle" fill="#94a3b8" font-size="9">Entity traversal</text>
    <text x="563" y="150" text-anchor="middle" fill="#94a3b8" font-size="9">Cross-memory discovery</text>
    <text x="563" y="165" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="500">Dream-learned PMI weights</text>
    <text x="563" y="195" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="600">+novel candidates</text>
    <!-- Mini graph visualization -->
    <circle cx="520" cy="225" r="4" fill="#ec4899" opacity="0.7"/>
    <circle cx="540" cy="218" r="4" fill="#ec4899" opacity="0.7"/>
    <circle cx="563" cy="230" r="3" fill="#f9a8d4" opacity="0.5"/>
    <circle cx="585" cy="220" r="4" fill="#ec4899" opacity="0.7"/>
    <circle cx="605" cy="228" r="4" fill="#ec4899" opacity="0.7"/>
    <line x1="520" y1="225" x2="540" y2="218" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    <line x1="540" y1="218" x2="563" y2="230" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    <line x1="563" y1="230" x2="585" y2="220" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    <line x1="585" y1="220" x2="605" y2="228" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    <line x1="520" y1="225" x2="585" y2="220" stroke="#ec4899" stroke-width="0.8" opacity="0.3"/>
    <line x1="540" y1="218" x2="605" y2="228" stroke="#ec4899" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Arrow T1.5 -> T2 -->
  <line x1="646" y1="162" x2="664" y2="162" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tier 2: ACT-R + Penalties -->
  <g filter="url(#ds)">
    <rect x="669" y="70" width="275" height="185" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="669" y="70" width="275" height="28" rx="10" fill="url(#t2Grad)"/>
    <rect x="669" y="90" width="275" height="8" fill="url(#t2Grad)"/>
    <text x="806" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="600">Tier 2: ACT-R Cognitive Scoring</text>
    <text x="806" y="115" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">Recency + Frequency + Context</text>

    <!-- Left column: scoring signals -->
    <text x="700" y="138" fill="#94a3b8" font-size="9">Base level (recency/freq)</text>
    <text x="700" y="153" fill="#94a3b8" font-size="9">Spreading activation (PMI)</text>
    <text x="700" y="168" fill="#94a3b8" font-size="9">Hierarchy bonus</text>

    <!-- Right column: penalties -->
    <text x="855" y="138" fill="#fca5a5" font-size="9">- Supersession penalty</text>
    <text x="855" y="153" fill="#fca5a5" font-size="9">- Conflict penalty</text>
    <text x="855" y="168" fill="#86efac" font-size="9">+ Intent type match</text>

    <!-- Formula -->
    <rect x="685" y="182" width="245" height="28" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="807" y="200" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="500">A = ln(&#8721;t&#8315;&#x1D48;) + S_pmi + &#949; &#8722; P_sup &#8722; P_con + H</text>

    <!-- Result bars -->
    <text x="690" y="225" fill="#94a3b8" font-size="7">1</text>
    <rect x="700" y="218" width="120" height="7" rx="3" fill="#22c55e" opacity="0.8"/>
    <text x="690" y="237" fill="#94a3b8" font-size="7">2</text>
    <rect x="700" y="230" width="95" height="7" rx="3" fill="#22c55e" opacity="0.6"/>
    <text x="690" y="249" fill="#94a3b8" font-size="7">3</text>
    <rect x="700" y="242" width="68" height="7" rx="3" fill="#f59e0b" opacity="0.5"/>

    <text x="806" y="250" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="500">Ranked results</text>
  </g>

  <!-- Formula bar at bottom -->
  <rect x="12" y="278" width="936" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="32" y="299" fill="#e2e8f0" font-size="11" font-weight="500">Scoring:</text>
  <text x="95" y="299" fill="#7dd3fc" font-size="10" font-family="'Fira Code', monospace">combined = bm25 * w_bm25 + splade * w_splade + activation * w_actr + graph * w_graph + hierarchy * w_hier</text>
  <text x="32" y="317" fill="#94a3b8" font-size="9">Intent-classified | Dream-learned PMI associations | Supersession/conflict penalties | Hierarchy bonus | Zero LLM at query time</text>

  <!-- Feature status bar -->
  <rect x="12" y="345" width="936" height="42" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <!-- Core row -->
  <text x="32" y="363" fill="#64748b" font-size="9" font-weight="500">Core:</text>
  <rect x="70" y="355" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="83" y="363" fill="#94a3b8" font-size="9">BM25</text>
  <rect x="125" y="355" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="138" y="363" fill="#94a3b8" font-size="9">SPLADE</text>
  <rect x="198" y="355" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="211" y="363" fill="#94a3b8" font-size="9">Graph Expansion</text>
  <rect x="325" y="355" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="338" y="363" fill="#94a3b8" font-size="9">ACT-R Scoring</text>
  <rect x="440" y="355" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="453" y="363" fill="#94a3b8" font-size="9">GLiNER NER</text>
  <rect x="545" y="355" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="558" y="363" fill="#94a3b8" font-size="9">Intent Classification</text>
  <!-- Opt-in row -->
  <text x="32" y="380" fill="#64748b" font-size="9" font-weight="500">Opt-in:</text>
  <rect x="80" y="372" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="93" y="380" fill="#94a3b8" font-size="9">Contradiction Detection</text>
  <rect x="260" y="372" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="273" y="380" fill="#94a3b8" font-size="9">Consolidation</text>
  <rect x="380" y="372" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="393" y="380" fill="#94a3b8" font-size="9">Dream Cycles</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0f1428"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00ff88;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#7c4dff;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#ff6b35;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowLine2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4081;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7c4dff;stop-opacity:0.4"/>
      <stop offset="70%" style="stop-color:#00e5ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="12"/>

  <!-- Matrix grid lines (subtle) -->
  <g opacity="0.04" stroke="#7c4dff">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- Floating data particles -->
  <g opacity="0.15" fill="#7c4dff">
    <circle cx="80" cy="60" r="1.5"/>
    <circle cx="230" cy="90" r="1"/>
    <circle cx="370" cy="45" r="2"/>
    <circle cx="520" cy="75" r="1.2"/>
    <circle cx="680" cy="55" r="1.8"/>
    <circle cx="830" cy="85" r="1"/>
    <circle cx="960" cy="50" r="1.5"/>
    <circle cx="1100" cy="70" r="1.2"/>
    <circle cx="150" cy="250" r="1"/>
    <circle cx="440" cy="270" r="1.5"/>
    <circle cx="750" cy="260" r="1.2"/>
    <circle cx="1050" cy="255" r="1.8"/>
  </g>

  <!-- Glow accent lines -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#glowLine)" filter="url(#softglow)"/>
  <rect x="0" y="318" width="1200" height="2" fill="url(#glowLine2)" filter="url(#softglow)"/>

  <!-- Left side: Technology stack badges -->
  <g transform="translate(60, 85)">
    <!-- NCMS badge -->
    <rect x="0" y="0" width="90" height="32" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
    <text x="45" y="21" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="700" letter-spacing="2">NCMS</text>

    <!-- NAT badge -->
    <rect x="0" y="48" width="90" height="32" rx="6" fill="none" stroke="#76b900" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
    <text x="45" y="69" text-anchor="middle" fill="#76b900" font-size="11" font-weight="600" letter-spacing="1">NAT</text>

    <!-- NemoClaw badge -->
    <rect x="0" y="96" width="90" height="32" rx="6" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
    <text x="45" y="117" text-anchor="middle" fill="#7c4dff" font-size="10" font-weight="600" letter-spacing="1">NemoClaw</text>
  </g>

  <!-- Connecting lines from badges to center -->
  <g stroke-width="1" opacity="0.3">
    <line x1="155" y1="101" x2="280" y2="120" stroke="#00ff88"/>
    <line x1="155" y1="133" x2="280" y2="145" stroke="#76b900"/>
    <line x1="155" y1="165" x2="280" y2="170" stroke="#7c4dff"/>
  </g>

  <!-- Center: Main title -->
  <text x="600" y="88" text-anchor="middle" fill="#ffffff" font-size="36" font-weight="300" letter-spacing="4" filter="url(#textglow)">Multi-Agent Software</text>
  <text x="600" y="132" text-anchor="middle" fill="#ffffff" font-size="36" font-weight="700" letter-spacing="4" filter="url(#textglow)">Delivery Pipeline</text>

  <!-- Separator line -->
  <rect x="380" y="148" width="440" height="1" fill="url(#glowLine)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="175" text-anchor="middle" fill="#8a8aaa" font-size="13" font-weight="400" letter-spacing="1" font-style="italic">From research to implementation design in one autonomous pass</text>

  <!-- Agent orbs -->
  <g transform="translate(310, 210)">
    <!-- PO -->
    <circle cx="0" cy="0" r="22" fill="#0a1a10" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>
    <text x="0" y="1" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="700">PO</text>
    <text x="0" y="38" text-anchor="middle" fill="#4a6a5a" font-size="8">Research</text>

    <!-- Connection line PO to Builder -->
    <line x1="26" y1="0" x2="146" y2="0" stroke="#00ff88" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
    <circle cx="86" cy="0" r="2" fill="#00ff88" opacity="0.4"/>

    <!-- Builder -->
    <circle cx="172" cy="0" r="22" fill="#1a1408" stroke="#ff9800" stroke-width="1.5" filter="url(#glow)"/>
    <text x="172" y="1" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="700">BLD</text>
    <text x="172" y="38" text-anchor="middle" fill="#6a5a3a" font-size="8">Design</text>

    <!-- Connection lines Builder to experts -->
    <line x1="198" y1="-8" x2="316" y2="-30" stroke="#ff9800" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
    <line x1="198" y1="8" x2="316" y2="30" stroke="#ff9800" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
    <circle cx="257" cy="-19" r="2" fill="#ff9800" opacity="0.4"/>
    <circle cx="257" cy="19" r="2" fill="#ff9800" opacity="0.4"/>

    <!-- Architect -->
    <circle cx="340" cy="-34" r="22" fill="#0a0e1a" stroke="#448aff" stroke-width="1.5" filter="url(#glow)"/>
    <text x="340" y="-33" text-anchor="middle" fill="#448aff" font-size="10" font-weight="700">ARC</text>
    <text x="340" y="2" text-anchor="middle" fill="#3a5a7a" font-size="8">Architect</text>

    <!-- Security -->
    <circle cx="340" cy="34" r="22" fill="#1a0a0a" stroke="#ff4081" stroke-width="1.5" filter="url(#glow)"/>
    <text x="340" y="35" text-anchor="middle" fill="#ff4081" font-size="10" font-weight="700">SEC</text>
    <text x="340" y="68" text-anchor="middle" fill="#7a3a4a" font-size="8">Security</text>

    <!-- Output arrow -->
    <line x1="366" y1="-20" x2="430" y2="0" stroke="#448aff" stroke-width="1" opacity="0.3"/>
    <line x1="366" y1="20" x2="430" y2="0" stroke="#ff4081" stroke-width="1" opacity="0.3"/>

    <!-- Design artifact -->
    <rect x="434" y="-16" width="60" height="32" rx="4" fill="#1a1428" stroke="#7c4dff" stroke-width="1" opacity="0.6"/>
    <text x="464" y="4" text-anchor="middle" fill="#7c4dff" font-size="8" font-weight="600">Design</text>
    <text x="464" y="14" text-anchor="middle" fill="#5a4a7a" font-size="7">Doc</text>
  </g>

  <!-- Right side: Key metrics -->
  <g transform="translate(1000, 85)">
    <text x="70" y="0" text-anchor="middle" fill="#3a3a5a" font-size="9" font-weight="600" letter-spacing="2">BENCHMARKS</text>

    <text x="0" y="24" fill="#00ff88" font-size="24" font-weight="700" filter="url(#textglow)">0.72</text>
    <text x="70" y="24" fill="#4a6a5a" font-size="9">nDCG@10 SciFact</text>

    <text x="0" y="56" fill="#448aff" font-size="24" font-weight="700" filter="url(#textglow)">6.3x</text>
    <text x="70" y="56" fill="#3a5a7a" font-size="9">vs Mem0 temporal</text>

    <text x="0" y="88" fill="#ff9800" font-size="24" font-weight="700" filter="url(#textglow)">2.8x</text>
    <text x="70" y="88" fill="#6a5a3a" font-size="9">vs Letta cross-doc</text>

    <text x="0" y="120" fill="#7c4dff" font-size="24" font-weight="700" filter="url(#textglow)">3B</text>
    <text x="70" y="120" fill="#5a4a7a" font-size="9">active params</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="1200" height="30" fill="#080c16" rx="0"/>
  <text x="600" y="310" text-anchor="middle" fill="#3a3a5a" font-size="10" letter-spacing="3">ZERO VECTOR DBS  &#x2022;  ZERO EMBEDDING APIs  &#x2022;  KERNEL-ISOLATED SANDBOXES  &#x2022;  FULL LLM OBSERVABILITY  &#x2022;  BUILT IN &lt;2 WEEKS</text>
</svg>

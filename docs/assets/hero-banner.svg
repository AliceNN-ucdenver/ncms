<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/><line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Decorative nodes (knowledge graph feel) -->
  <g opacity="0.15">
    <circle cx="120" cy="60" r="3" fill="#818cf8"/>
    <circle cx="180" cy="45" r="2" fill="#a78bfa"/>
    <circle cx="155" cy="80" r="2.5" fill="#c084fc"/>
    <line x1="120" y1="60" x2="180" y2="45" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="120" y1="60" x2="155" y2="80" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="180" y1="45" x2="155" y2="80" stroke="#a78bfa" stroke-width="0.5"/>

    <circle cx="750" cy="140" r="3" fill="#818cf8"/>
    <circle cx="790" cy="120" r="2" fill="#a78bfa"/>
    <circle cx="810" cy="155" r="2.5" fill="#c084fc"/>
    <circle cx="720" cy="160" r="2" fill="#f472b6"/>
    <line x1="750" y1="140" x2="790" y2="120" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="750" y1="140" x2="810" y2="155" stroke="#818cf8" stroke-width="0.5"/>
    <line x1="790" y1="120" x2="810" y2="155" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="720" y1="160" x2="750" y2="140" stroke="#f472b6" stroke-width="0.5"/>
  </g>

  <!-- Brain/memory icon -->
  <g transform="translate(350, 35)" opacity="0.9">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#a78bfa" opacity="0.6"/>
    <!-- Neural paths -->
    <line x1="5" y1="-3" x2="16" y2="-10" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
    <line x1="-4" y1="4" x2="-14" y2="12" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
    <line x1="3" y1="5" x2="10" y2="15" stroke="#c084fc" stroke-width="0.8" opacity="0.4"/>
    <line x1="-5" y1="-2" x2="-15" y2="-8" stroke="#c084fc" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="450" y="60" text-anchor="middle" fill="url(#titleGrad)" font-size="42" font-weight="800" letter-spacing="3" filter="url(#textGlow)">NCMS</text>

  <!-- Accent line -->
  <rect x="250" y="75" width="400" height="2" rx="1" fill="url(#accentLine)"/>

  <!-- Subtitle -->
  <text x="450" y="100" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="300" letter-spacing="2">NeMo Cognitive Memory System</text>

  <!-- Tagline -->
  <text x="450" y="130" text-anchor="middle" fill="#94a3b8" font-size="12">Persistent cognitive memory for AI agents that actually remember</text>

  <!-- Feature pills -->
  <g transform="translate(450, 155)">
    <rect x="-220" y="0" width="130" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
    <text x="-155" y="16" text-anchor="middle" fill="#a5b4fc" font-size="10">Vector-Free Retrieval</text>

    <rect x="-70" y="0" width="140" height="24" rx="12" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.6"/>
    <text x="0" y="16" text-anchor="middle" fill="#7dd3fc" font-size="10">Embedded Knowledge Bus</text>

    <rect x="90" y="0" width="130" height="24" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
    <text x="155" y="16" text-anchor="middle" fill="#fcd34d" font-size="10">Agent Snapshots</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="196" width="900" height="4" fill="url(#accentLine)" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="eeInputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="eeRegexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="eeGlinerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="eeKeywordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="eeGraphGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="eeShadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="eeArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="eeArrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="eeArrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <marker id="eeArrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Entity Extraction Pipeline</text>
  <text x="450" y="48" text-anchor="middle" fill="#94a3b8" font-size="11">Store-time extraction feeds the knowledge graph for spreading activation and graph expansion</text>

  <!-- Content Input -->
  <g filter="url(#eeShadow)">
    <rect x="30" y="70" width="120" height="195" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="30" y="70" width="120" height="28" rx="10" fill="url(#eeInputGrad)"/>
    <rect x="30" y="88" width="120" height="10" fill="url(#eeInputGrad)"/>
    <text x="90" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="600">Memory Content</text>
    <text x="90" y="118" text-anchor="middle" fill="#94a3b8" font-size="8">"PostgreSQL connection</text>
    <text x="90" y="132" text-anchor="middle" fill="#94a3b8" font-size="8">pooling config via</text>
    <text x="90" y="146" text-anchor="middle" fill="#94a3b8" font-size="8">PgBouncer for the</text>
    <text x="90" y="160" text-anchor="middle" fill="#94a3b8" font-size="8">authentication service"</text>
    <text x="90" y="190" text-anchor="middle" fill="#64748b" font-size="8">+ query text</text>
    <text x="90" y="204" text-anchor="middle" fill="#64748b" font-size="8">at search-time</text>
  </g>

  <!-- Row 1: Regex Heuristics (always available) -->
  <line x1="150" y1="115" x2="195" y2="115" stroke="#0ea5e9" stroke-width="2" marker-end="url(#eeArrowCyan)"/>
  <g filter="url(#eeShadow)">
    <rect x="200" y="75" width="230" height="80" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <rect x="200" y="75" width="230" height="26" rx="10" fill="url(#eeRegexGrad)"/>
    <rect x="200" y="91" width="230" height="10" fill="url(#eeRegexGrad)"/>
    <text x="315" y="93" text-anchor="middle" fill="white" font-size="10" font-weight="600">Regex Heuristics</text>
    <text x="315" y="114" text-anchor="middle" fill="#7dd3fc" font-size="9">Built-in, zero deps</text>
    <text x="315" y="130" text-anchor="middle" fill="#94a3b8" font-size="8">Tech catalog | PascalCase | API paths | Tables</text>
    <text x="315" y="145" text-anchor="middle" fill="#64748b" font-size="8">Always available as fallback</text>
  </g>

  <!-- Row 2: GLiNER NER (optional) -->
  <line x1="150" y1="180" x2="195" y2="180" stroke="#a855f7" stroke-width="2" marker-end="url(#eeArrowPurple)"/>
  <g filter="url(#eeShadow)">
    <rect x="200" y="165" width="230" height="55" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
    <rect x="200" y="165" width="230" height="22" rx="10" fill="url(#eeGlinerGrad)" opacity="0.85"/>
    <rect x="200" y="179" width="230" height="8" fill="url(#eeGlinerGrad)" opacity="0.85"/>
    <text x="315" y="182" text-anchor="middle" fill="white" font-size="10" font-weight="600">GLiNER NER</text>
    <text x="315" y="201" text-anchor="middle" fill="#c4b5fd" font-size="8">209M DeBERTa | Zero-shot | Custom labels</text>
    <text x="315" y="213" text-anchor="middle" fill="#64748b" font-size="7" font-style="italic">pip install ncms[gliner]</text>
  </g>

  <!-- Fallback arrow from GLiNER to Regex -->
  <path d="M 200 185 C 180 185 180 130 200 130" stroke="#64748b" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <text x="172" y="155" fill="#64748b" font-size="7" transform="rotate(-90 172 155)">fallback</text>

  <!-- Row 3: Keyword Extractor (optional) -->
  <line x1="150" y1="240" x2="195" y2="240" stroke="#ec4899" stroke-width="2" marker-end="url(#eeArrowPink)"/>
  <g filter="url(#eeShadow)">
    <rect x="200" y="228" width="230" height="55" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6,3"/>
    <rect x="200" y="228" width="230" height="22" rx="10" fill="url(#eeKeywordGrad)" opacity="0.85"/>
    <rect x="200" y="242" width="230" height="8" fill="url(#eeKeywordGrad)" opacity="0.85"/>
    <text x="315" y="245" text-anchor="middle" fill="white" font-size="10" font-weight="600">Keyword Bridges</text>
    <text x="315" y="264" text-anchor="middle" fill="#f9a8d4" font-size="8">LLM-extracted | Semantic concepts | Bridge nodes</text>
    <text x="315" y="276" text-anchor="middle" fill="#64748b" font-size="7" font-style="italic">NCMS_KEYWORD_BRIDGE_ENABLED=true</text>
  </g>

  <!-- Merge zone: Entities + Keywords -->
  <g filter="url(#eeShadow)">
    <rect x="490" y="80" width="150" height="205" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="490" y="80" width="150" height="26" rx="10" fill="url(#eeGraphGrad)"/>
    <rect x="490" y="96" width="150" height="10" fill="url(#eeGraphGrad)"/>
    <text x="565" y="98" text-anchor="middle" fill="white" font-size="10" font-weight="600">Extracted Entities</text>

    <!-- Entity type pills -->
    <rect x="505" y="115" width="65" height="16" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
    <text x="537" y="127" text-anchor="middle" fill="#7dd3fc" font-size="8">technology</text>
    <rect x="578" y="115" width="55" height="16" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
    <text x="605" y="127" text-anchor="middle" fill="#7dd3fc" font-size="8">endpoint</text>
    <rect x="505" y="137" width="63" height="16" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
    <text x="536" y="149" text-anchor="middle" fill="#7dd3fc" font-size="8">component</text>
    <rect x="576" y="137" width="55" height="16" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="0.5"/>
    <text x="603" y="149" text-anchor="middle" fill="#7dd3fc" font-size="8">service</text>
    <rect x="505" y="159" width="55" height="16" rx="8" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="532" y="171" text-anchor="middle" fill="#c4b5fd" font-size="8">concept</text>
    <rect x="568" y="159" width="62" height="16" rx="8" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="599" y="171" text-anchor="middle" fill="#c4b5fd" font-size="8">database</text>
    <rect x="505" y="181" width="55" height="16" rx="8" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="532" y="193" text-anchor="middle" fill="#c4b5fd" font-size="8">protocol</text>
    <rect x="568" y="181" width="55" height="16" rx="8" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="595" y="193" text-anchor="middle" fill="#c4b5fd" font-size="8">library</text>

    <!-- Divider -->
    <line x1="505" y1="207" x2="625" y2="207" stroke="#334155" stroke-width="0.5"/>

    <!-- Keyword type pills -->
    <rect x="505" y="215" width="120" height="16" rx="8" fill="#4a1942" stroke="#ec4899" stroke-width="0.5"/>
    <text x="565" y="227" text-anchor="middle" fill="#f9a8d4" font-size="8">keyword (bridge nodes)</text>

    <!-- Dedup badge -->
    <text x="565" y="262" text-anchor="middle" fill="#64748b" font-size="7">dedup | cap at 20</text>
  </g>

  <!-- Arrows from extractors to entity zone -->
  <line x1="430" y1="115" x2="485" y2="130" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#eeArrow)"/>
  <line x1="430" y1="185" x2="485" y2="170" stroke="#a855f7" stroke-width="1.5" marker-end="url(#eeArrow)"/>
  <line x1="430" y1="250" x2="485" y2="230" stroke="#ec4899" stroke-width="1.5" marker-end="url(#eeArrow)"/>

  <!-- Knowledge Graph output -->
  <line x1="640" y1="180" x2="680" y2="180" stroke="#f59e0b" stroke-width="2" marker-end="url(#eeArrow)"/>

  <g filter="url(#eeShadow)">
    <rect x="685" y="100" width="190" height="165" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="685" y="100" width="190" height="26" rx="10" fill="url(#eeGraphGrad)"/>
    <rect x="685" y="116" width="190" height="10" fill="url(#eeGraphGrad)"/>
    <text x="780" y="118" text-anchor="middle" fill="white" font-size="10" font-weight="600">Knowledge Graph</text>
    <text x="780" y="140" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="500">NetworkX DiGraph</text>

    <!-- Mini graph -->
    <circle cx="720" cy="165" r="6" fill="#0ea5e9" opacity="0.8"/>
    <text x="720" y="168" text-anchor="middle" fill="white" font-size="5" font-weight="700">T</text>
    <circle cx="755" cy="155" r="6" fill="#a855f7" opacity="0.8"/>
    <text x="755" y="158" text-anchor="middle" fill="white" font-size="5" font-weight="700">C</text>
    <circle cx="790" cy="170" r="6" fill="#0ea5e9" opacity="0.8"/>
    <text x="790" y="173" text-anchor="middle" fill="white" font-size="5" font-weight="700">T</text>
    <circle cx="835" cy="158" r="6" fill="#ec4899" opacity="0.8"/>
    <text x="835" y="161" text-anchor="middle" fill="white" font-size="5" font-weight="700">K</text>
    <circle cx="755" cy="195" r="6" fill="#ec4899" opacity="0.8"/>
    <text x="755" y="198" text-anchor="middle" fill="white" font-size="5" font-weight="700">K</text>
    <circle cx="820" cy="195" r="6" fill="#0ea5e9" opacity="0.8"/>
    <text x="820" y="198" text-anchor="middle" fill="white" font-size="5" font-weight="700">E</text>

    <!-- Edges -->
    <line x1="720" y1="165" x2="755" y2="155" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
    <line x1="755" y1="155" x2="790" y2="170" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
    <line x1="790" y1="170" x2="835" y2="158" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
    <line x1="755" y1="155" x2="835" y2="158" stroke="#64748b" stroke-width="0.8" opacity="0.4"/>
    <line x1="755" y1="195" x2="835" y2="158" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    <line x1="720" y1="165" x2="755" y2="195" stroke="#64748b" stroke-width="0.8" opacity="0.4"/>
    <line x1="755" y1="195" x2="820" y2="195" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>

    <!-- Legend -->
    <text x="780" y="230" text-anchor="middle" fill="#64748b" font-size="7">T=technology  C=concept  K=keyword  E=endpoint</text>

    <!-- Purpose labels -->
    <text x="780" y="250" text-anchor="middle" fill="#94a3b8" font-size="8">Spreading activation</text>
    <text x="780" y="260" text-anchor="middle" fill="#94a3b8" font-size="8">Graph expansion</text>
  </g>

  <!-- Contradiction Detection (opt-in) -->
  <line x1="780" y1="265" x2="780" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <g filter="url(#eeShadow)">
    <rect x="695" y="290" width="175" height="55" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <rect x="695" y="290" width="175" height="22" rx="10" fill="#ef4444" opacity="0.25"/>
    <rect x="695" y="304" width="175" height="8" fill="#ef4444" opacity="0.25"/>
    <text x="782" y="306" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Contradiction Detection</text>
    <text x="782" y="325" text-anchor="middle" fill="#94a3b8" font-size="8">LLM-powered factual contradiction checks</text>
    <text x="782" y="338" text-anchor="middle" fill="#64748b" font-size="7" font-style="italic">opt-in &#xB7; NCMS_CONTRADICTION_ENABLED</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="368" text-anchor="middle" fill="#64748b" font-size="9">Extraction runs at store-time (all memories) and search-time (queries) | Regex is always the fallback</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="eeInputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="eeTopicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="eeGlinerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="eeKeywordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="eeGraphGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="eeShadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="eeArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="eeArrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="eeArrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <marker id="eeArrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899"/>
    </marker>
    <marker id="eeArrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="460" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="460" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Entity Extraction Pipeline</text>
  <text x="460" y="48" text-anchor="middle" fill="#94a3b8" font-size="11">Domain-agnostic extraction with dynamic topic resolution feeds the knowledge graph</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- TOP ROW: Topic Resolution (left) → GLiNER (center) → Entities    -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Topic Resolution Box -->
  <g filter="url(#eeShadow)">
    <rect x="25" y="68" width="200" height="160" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <rect x="25" y="68" width="200" height="26" rx="10" fill="url(#eeTopicGrad)"/>
    <rect x="25" y="84" width="200" height="10" fill="url(#eeTopicGrad)"/>
    <text x="125" y="87" text-anchor="middle" fill="white" font-size="11" font-weight="600">Topic Resolution</text>

    <!-- Resolution chain -->
    <text x="125" y="112" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="500">Label resolution chain:</text>

    <!-- Step 1: CLI preload -->
    <rect x="40" y="122" width="170" height="20" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="48" y="136" fill="#6ee7b7" font-size="8" font-weight="600">1.</text>
    <text x="60" y="136" fill="#a7f3d0" font-size="8">ncms topics set &#x2329;domain&#x232A; &#x2329;labels&#x232A;</text>

    <!-- Step 2: LLM detect -->
    <rect x="40" y="147" width="170" height="20" rx="5" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="48" y="161" fill="#6ee7b7" font-size="8" font-weight="600">2.</text>
    <text x="60" y="161" fill="#a7f3d0" font-size="8">ncms topics detect &#x2329;domain&#x232A; &#x2329;files&#x232A;</text>

    <!-- Step 3: Universal fallback -->
    <rect x="40" y="172" width="170" height="20" rx="5" fill="#1e293b" stroke="#64748b" stroke-width="0.5"/>
    <text x="48" y="186" fill="#6ee7b7" font-size="8" font-weight="600">3.</text>
    <text x="60" y="186" fill="#94a3b8" font-size="8">Universal fallback (10 labels)</text>

    <!-- Cache note -->
    <text x="125" y="218" text-anchor="middle" fill="#64748b" font-size="7">Cached in consolidation_state</text>
  </g>

  <!-- Content Input -->
  <g filter="url(#eeShadow)">
    <rect x="25" y="245" width="200" height="100" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="25" y="245" width="200" height="26" rx="10" fill="url(#eeInputGrad)"/>
    <rect x="25" y="261" width="200" height="10" fill="url(#eeInputGrad)"/>
    <text x="125" y="263" text-anchor="middle" fill="white" font-size="11" font-weight="600">Memory Content</text>
    <text x="125" y="286" text-anchor="middle" fill="#94a3b8" font-size="8">"PostgreSQL connection pooling</text>
    <text x="125" y="299" text-anchor="middle" fill="#94a3b8" font-size="8">config via PgBouncer for the</text>
    <text x="125" y="312" text-anchor="middle" fill="#94a3b8" font-size="8">authentication service"</text>
    <text x="125" y="332" text-anchor="middle" fill="#64748b" font-size="8">+ query text at search-time</text>
  </g>

  <!-- Arrow: Topic Resolution → GLiNER (labels flow) -->
  <line x1="225" y1="148" x2="260" y2="148" stroke="#10b981" stroke-width="2" marker-end="url(#eeArrowGreen)"/>
  <text x="243" y="140" text-anchor="middle" fill="#6ee7b7" font-size="7">labels</text>

  <!-- Arrow: Content → GLiNER (text flow) -->
  <line x1="225" y1="290" x2="260" y2="210" stroke="#a855f7" stroke-width="2" marker-end="url(#eeArrowPurple)"/>
  <text x="237" y="245" fill="#c4b5fd" font-size="7" transform="rotate(-50 237 245)">text</text>

  <!-- GLiNER NER (required, solid border) -->
  <g filter="url(#eeShadow)">
    <rect x="265" y="100" width="230" height="150" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <rect x="265" y="100" width="230" height="28" rx="10" fill="url(#eeGlinerGrad)"/>
    <rect x="265" y="118" width="230" height="10" fill="url(#eeGlinerGrad)"/>
    <text x="380" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="600">GLiNER Zero-Shot NER</text>

    <!-- Required badge -->
    <rect x="280" y="138" width="60" height="14" rx="7" fill="#7c3aed"/>
    <text x="310" y="149" text-anchor="middle" fill="white" font-size="7" font-weight="600">REQUIRED</text>

    <text x="380" y="149" fill="#c4b5fd" font-size="8">209M DeBERTa model</text>

    <text x="380" y="168" text-anchor="middle" fill="#94a3b8" font-size="8">Uses resolved labels to extract entities</text>
    <text x="380" y="182" text-anchor="middle" fill="#94a3b8" font-size="8">from any domain: tech, finance, biomedical...</text>

    <!-- Example labels -->
    <text x="380" y="200" text-anchor="middle" fill="#64748b" font-size="7">Example labels:</text>
    <rect x="280" y="207" width="50" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="305" y="217" text-anchor="middle" fill="#c4b5fd" font-size="7">person</text>
    <rect x="335" y="207" width="68" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="369" y="217" text-anchor="middle" fill="#c4b5fd" font-size="7">organization</text>
    <rect x="408" y="207" width="70" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="443" y="217" text-anchor="middle" fill="#c4b5fd" font-size="7">technology</text>
    <rect x="280" y="224" width="52" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="306" y="234" text-anchor="middle" fill="#c4b5fd" font-size="7">concept</text>
    <rect x="337" y="224" width="45" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="359" y="234" text-anchor="middle" fill="#c4b5fd" font-size="7">event</text>
    <rect x="387" y="224" width="50" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="412" y="234" text-anchor="middle" fill="#c4b5fd" font-size="7">product</text>
    <rect x="442" y="224" width="38" height="13" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="461" y="234" text-anchor="middle" fill="#c4b5fd" font-size="7">...</text>
  </g>

  <!-- Keyword Bridges (optional) -->
  <line x1="225" y1="310" x2="260" y2="310" stroke="#ec4899" stroke-width="2" marker-end="url(#eeArrowPink)"/>
  <g filter="url(#eeShadow)">
    <rect x="265" y="275" width="230" height="70" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6,3"/>
    <rect x="265" y="275" width="230" height="24" rx="10" fill="url(#eeKeywordGrad)" opacity="0.85"/>
    <rect x="265" y="291" width="230" height="8" fill="url(#eeKeywordGrad)" opacity="0.85"/>
    <text x="380" y="293" text-anchor="middle" fill="white" font-size="10" font-weight="600">Keyword Bridges</text>
    <text x="380" y="313" text-anchor="middle" fill="#f9a8d4" font-size="8">LLM-extracted semantic concepts</text>
    <text x="380" y="328" text-anchor="middle" fill="#f9a8d4" font-size="8">Bridge disconnected subgraphs</text>
    <text x="380" y="340" text-anchor="middle" fill="#64748b" font-size="7" font-style="italic">NCMS_KEYWORD_BRIDGE_ENABLED=true</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- RIGHT SIDE: Extracted Entities → Knowledge Graph                  -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Arrows from extractors to entity zone -->
  <line x1="495" y1="175" x2="540" y2="170" stroke="#a855f7" stroke-width="1.5" marker-end="url(#eeArrow)"/>
  <line x1="495" y1="310" x2="540" y2="260" stroke="#ec4899" stroke-width="1.5" marker-end="url(#eeArrow)"/>

  <!-- Merge zone: Extracted Entities -->
  <g filter="url(#eeShadow)">
    <rect x="545" y="105" width="150" height="200" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="545" y="105" width="150" height="26" rx="10" fill="url(#eeGraphGrad)"/>
    <rect x="545" y="121" width="150" height="10" fill="url(#eeGraphGrad)"/>
    <text x="620" y="123" text-anchor="middle" fill="white" font-size="10" font-weight="600">Extracted Entities</text>

    <!-- Entity type pills (universal labels) -->
    <rect x="560" y="140" width="55" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="587" y="151" text-anchor="middle" fill="#c4b5fd" font-size="7">person</text>
    <rect x="621" y="140" width="62" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="652" y="151" text-anchor="middle" fill="#c4b5fd" font-size="7">technology</text>
    <rect x="560" y="160" width="70" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="595" y="171" text-anchor="middle" fill="#c4b5fd" font-size="7">organization</text>
    <rect x="635" y="160" width="50" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="660" y="171" text-anchor="middle" fill="#c4b5fd" font-size="7">concept</text>
    <rect x="560" y="180" width="50" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="585" y="191" text-anchor="middle" fill="#c4b5fd" font-size="7">location</text>
    <rect x="616" y="180" width="45" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="638" y="191" text-anchor="middle" fill="#c4b5fd" font-size="7">event</text>
    <rect x="560" y="200" width="52" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="586" y="211" text-anchor="middle" fill="#c4b5fd" font-size="7">product</text>
    <rect x="617" y="200" width="55" height="15" rx="7" fill="#312e81" stroke="#a855f7" stroke-width="0.5"/>
    <text x="644" y="211" text-anchor="middle" fill="#c4b5fd" font-size="7">process</text>

    <!-- Divider -->
    <line x1="560" y1="225" x2="680" y2="225" stroke="#334155" stroke-width="0.5"/>

    <!-- Custom / keyword type pills -->
    <rect x="560" y="233" width="120" height="15" rx="7" fill="#4a1942" stroke="#ec4899" stroke-width="0.5"/>
    <text x="620" y="244" text-anchor="middle" fill="#f9a8d4" font-size="7">keyword (bridge nodes)</text>

    <rect x="560" y="253" width="120" height="15" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
    <text x="620" y="264" text-anchor="middle" fill="#6ee7b7" font-size="7">+ domain-specific labels</text>

    <!-- Dedup badge -->
    <text x="620" y="293" text-anchor="middle" fill="#64748b" font-size="7">dedup | cap at 20</text>
  </g>

  <!-- Arrow: Entities → Knowledge Graph -->
  <line x1="695" y1="200" x2="730" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#eeArrowAmber)"/>

  <!-- Knowledge Graph -->
  <g filter="url(#eeShadow)">
    <rect x="735" y="110" width="165" height="195" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="735" y="110" width="165" height="26" rx="10" fill="url(#eeGraphGrad)"/>
    <rect x="735" y="126" width="165" height="10" fill="url(#eeGraphGrad)"/>
    <text x="817" y="128" text-anchor="middle" fill="white" font-size="10" font-weight="600">Knowledge Graph</text>
    <text x="817" y="148" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="500">NetworkX DiGraph</text>

    <!-- Mini graph -->
    <circle cx="770" cy="175" r="6" fill="#a855f7" opacity="0.8"/>
    <text x="770" y="178" text-anchor="middle" fill="white" font-size="5" font-weight="700">P</text>
    <circle cx="800" cy="165" r="6" fill="#a855f7" opacity="0.8"/>
    <text x="800" y="168" text-anchor="middle" fill="white" font-size="5" font-weight="700">T</text>
    <circle cx="840" cy="178" r="6" fill="#a855f7" opacity="0.8"/>
    <text x="840" y="181" text-anchor="middle" fill="white" font-size="5" font-weight="700">O</text>
    <circle cx="870" cy="165" r="6" fill="#ec4899" opacity="0.8"/>
    <text x="870" y="168" text-anchor="middle" fill="white" font-size="5" font-weight="700">K</text>
    <circle cx="800" cy="200" r="6" fill="#a855f7" opacity="0.8"/>
    <text x="800" y="203" text-anchor="middle" fill="white" font-size="5" font-weight="700">C</text>
    <circle cx="855" cy="200" r="6" fill="#ec4899" opacity="0.8"/>
    <text x="855" y="203" text-anchor="middle" fill="white" font-size="5" font-weight="700">K</text>

    <!-- Edges -->
    <line x1="770" y1="175" x2="800" y2="165" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
    <line x1="800" y1="165" x2="840" y2="178" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
    <line x1="840" y1="178" x2="870" y2="165" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
    <line x1="800" y1="165" x2="870" y2="165" stroke="#64748b" stroke-width="0.8" opacity="0.4"/>
    <line x1="800" y1="200" x2="870" y2="165" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    <line x1="770" y1="175" x2="800" y2="200" stroke="#64748b" stroke-width="0.8" opacity="0.4"/>
    <line x1="800" y1="200" x2="855" y2="200" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>

    <!-- Legend -->
    <text x="817" y="230" text-anchor="middle" fill="#64748b" font-size="7">P=person  T=technology  O=org</text>
    <text x="817" y="241" text-anchor="middle" fill="#64748b" font-size="7">C=concept  K=keyword</text>

    <!-- Purpose -->
    <text x="817" y="260" text-anchor="middle" fill="#94a3b8" font-size="8">Spreading activation</text>
    <text x="817" y="273" text-anchor="middle" fill="#94a3b8" font-size="8">Graph expansion</text>
    <text x="817" y="286" text-anchor="middle" fill="#94a3b8" font-size="8">Cross-memory discovery</text>
  </g>

  <!-- Contradiction Detection (opt-in, below graph) -->
  <line x1="817" y1="305" x2="817" y2="330" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <g filter="url(#eeShadow)">
    <rect x="730" y="330" width="175" height="50" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <rect x="730" y="330" width="175" height="22" rx="10" fill="#ef4444" opacity="0.25"/>
    <rect x="730" y="344" width="175" height="8" fill="#ef4444" opacity="0.25"/>
    <text x="817" y="346" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Contradiction Detection</text>
    <text x="817" y="365" text-anchor="middle" fill="#94a3b8" font-size="8">LLM-powered factual checks at ingest</text>
    <text x="817" y="376" text-anchor="middle" fill="#64748b" font-size="7" font-style="italic">opt-in &#xB7; NCMS_CONTRADICTION_ENABLED</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- BOTTOM: Narrative section                                          -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Divider line -->
  <line x1="30" y1="400" x2="890" y2="400" stroke="#334155" stroke-width="0.5"/>

  <!-- Narrative -->
  <text x="460" y="420" text-anchor="middle" fill="#94a3b8" font-size="9">Topics are resolved per-domain at store-time and search-time. Preload labels with <tspan fill="#6ee7b7" font-weight="600">ncms topics set</tspan> or</text>
  <text x="460" y="435" text-anchor="middle" fill="#94a3b8" font-size="9">auto-detect with <tspan fill="#6ee7b7" font-weight="600">ncms topics detect</tspan> (LLM-powered). Without cached labels, 10 universal defaults apply.</text>
  <text x="460" y="450" text-anchor="middle" fill="#64748b" font-size="8">GLiNER is always on (required dependency). No regex fallback needed.</text>
</svg>
